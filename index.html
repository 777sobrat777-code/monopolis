<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Денежное Слияние 2048</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: min(95vw, 500px);
            margin-bottom: 12px;
            gap: 10px;
            flex-wrap: wrap;
        }

        h1 {
            font-size: clamp(1.2em, 4vw, 1.8em);
            color: #f1c40f;
            text-shadow: 0 0 20px rgba(241, 196, 15, 0.3);
            letter-spacing: 1px;
        }

        .score-box {
            background: rgba(255,255,255,0.08);
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12);
        }

        .score-box .label { color: #aaa; font-size: 0.7em; text-transform: uppercase; letter-spacing: 2px; }
        .score-box .value { color: #f1c40f; font-size: 1.3em; }

        .timer-box {
            background: rgba(255,255,255,0.08);
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12);
            font-variant-numeric: tabular-nums;
            font-family: 'Courier New', monospace;
            min-width: 100px;
            justify-content: center;
        }

        .timer-box .label { color: #aaa; font-size: 0.7em; text-transform: uppercase; letter-spacing: 2px; }

        .game-container {
            position: relative;
            width: min(95vw, 500px);
            aspect-ratio: 1;
        }

        .grid-background {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 6px;
            padding: 6px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .bg-cell {
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
        }

        .tiles-layer {
            position: absolute;
            inset: 6px;
            pointer-events: none;
        }

        .tile {
            position: absolute;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform;
            text-align: center;
            line-height: 1.1;
            font-size: clamp(0.55em, 2.2vw, 0.9em);
            word-break: break-word;
            hyphens: auto;
            overflow: hidden;
            padding: 2px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.25);
            animation: tile-appear 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes tile-appear {
            0% { transform: scale(0) translate(0,0); opacity: 0; }
            100% { transform: scale(1) translate(0,0); opacity: 1; }
        }

        @keyframes tile-merge {
            0% { transform: scale(1); }
            40% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        .tile.merged {
            animation: tile-merge 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
        }

        /* Цвета тайлов */
        .t-1  { background: #2ecc71; color: #1a3a1a; }
        .t-2  { background: #27ae60; color: white; }
        .t-3  { background: #1abc9c; color: white; }
        .t-4  { background: #16a085; color: white; }
        .t-5  { background: #f1c40f; color: #3d2e00; }
        .t-6  { background: #f39c12; color: white; }
        .t-7  { background: #e67e22; color: white; }
        .t-8  { background: #d35400; color: white; }
        .t-9  { background: #e74c3c; color: white; }
        .t-10 { background: #c0392b; color: white; }
        .t-11 { background: #8e6b3e; color: #ffe0a8; }
        .t-12 { background: #d4af37; color: #3d2e00; text-shadow: 0 0 8px rgba(255,215,0,0.5); }
        .t-13 { background: linear-gradient(135deg, #d4af37, #ffd700); color: #3d2e00; font-weight: 900; }
        .t-14 { background: linear-gradient(135deg, #c0c0c0, #e8e8e8); color: #1a1a1a; font-weight: 900; border: 2px solid #ffd700; }
        .t-15 { background: #1a1a1a; color: #c0c0c0; border: 2px solid #c0c0c0; font-weight: 900; }
        .t-16 { background: linear-gradient(135deg, #2c3e50, #34495e); color: #f1c40f; border: 3px solid #f1c40f; font-weight: 900; text-shadow: 0 0 10px rgba(241,196,15,0.4); }
        .t-17 { background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b); color: #1a0000; font-weight: 900; font-size: 1.1em; text-shadow: 0 0 15px rgba(255,215,0,0.8); border: 3px solid #fff; animation: pulse-magnate 2s ease-in-out infinite; }

        @keyframes pulse-magnate {
            0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.6); }
            50% { box-shadow: 0 0 40px rgba(255,215,0,1); }
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        button:hover {
            background: rgba(255,255,255,0.2);
            border-color: #f1c40f;
            color: #f1c40f;
        }

        button.music-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            background: rgba(241,196,15,0.15);
            border-color: rgba(241,196,15,0.3);
        }

        button.music-btn.muted {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
            opacity: 0.5;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
            animation: fade-in 0.3s;
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .overlay-box {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 30px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .overlay-box h2 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .overlay-box.win h2 { color: #f1c40f; }
        .overlay-box.lose h2 { color: #e74c3c; }

        .overlay-box button {
            margin-top: 16px;
            padding: 14px 30px;
            font-size: 1.1em;
        }

        .touch-hint {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75em;
            color: rgba(255,255,255,0.35);
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>Денежное Слияние</h1>
        <div class="timer-box">
            <span class="label">Время</span>
            <span id="timer">00:00</span>
        </div>
        <div class="score-box">
            <span class="label">Баланс</span>
            <span class="value" id="score">0</span>
            <span style="color:#aaa; font-size:0.8em;">₽</span>
        </div>
    </div>

    <div class="game-container" id="gameContainer">
        <div class="grid-background" id="gridBackground"></div>
        <div class="tiles-layer" id="tilesLayer"></div>
    </div>

    <div class="btn-row">
        <button onclick="Game.restart()">Начать заново</button>
        <button class="music-btn" id="musicBtn" onclick="Game.toggleMusic()">♪</button>
    </div>

    <div id="overlayContainer"></div>

<script>
const Game = (() => {
    const SIZE = 6;
    let grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    let score = 0;
    let won = false;
    let gameOver = false;
    let movedThisTurn = false;
    let seconds = 0;
    let timerInterval = null;
    let musicEnabled = false;
    let audioCtx = null;
    let musicInterval = null;
    let tileIdCounter = 0;
    let previousPositions = new Map(); // tileId -> {r,c}

    // Иерархия: индекс = уровень (0 — пусто, 1 — 1₽, ..., 17 — Магнат)
    const NAMES = [
        '', '1 ₽', '2 ₽', '5 ₽', '10 ₽', '100 ₽', '500 ₽', '1000 ₽',
        '2000 ₽', '5000 ₽', '10 000 ₽', 'Чемодан', 'Золотой чемодан',
        'Слиток', 'Слитки', 'Мерседес', 'Банк', 'Магнат'
    ];

    const MAX_LEVEL = 17;

    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const tilesLayer = document.getElementById('tilesLayer');
    const overlayContainer = document.getElementById('overlayContainer');
    const musicBtn = document.getElementById('musicBtn');

    // Строим фоновые ячейки
    const gridBg = document.getElementById('gridBackground');
    for (let i = 0; i < SIZE * SIZE; i++) {
        const cell = document.createElement('div');
        cell.className = 'bg-cell';
        gridBg.appendChild(cell);
    }

    function getTileSize() {
        const container = document.getElementById('gameContainer');
        const rect = container.getBoundingClientRect();
        const totalSize = rect.width;
        const innerSize = totalSize - 12; // padding 6px с каждой стороны
        const gap = 6;
        const cellSize = (innerSize - gap * (SIZE - 1)) / SIZE;
        return { cellSize, gap, totalSize, innerSize };
    }

    function tileTransform(r, c) {
        const { cellSize, gap } = getTileSize();
        const x = c * (cellSize + gap);
        const y = r * (cellSize + gap);
        return `translate(${x}px, ${y}px)`;
    }

    // Каждый тайл — это div с data-id, data-level, data-r, data-c
    // При ререндере мы обновляем transform И уровень
    function render() {
        const { cellSize } = getTileSize();

        // Собираем, что должно быть на поле
        const currentTiles = [];
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                if (grid[r][c] !== 0) {
                    currentTiles.push({ r, c, level: grid[r][c] });
                }
            }
        }

        // Сопоставляем существующие DOM-элементы с текущими тайлами по координатам
        const existingDivs = new Map(); // key "r,c" -> div
        const allTileDivs = tilesLayer.querySelectorAll('.tile');
        const usedKeys = new Set();

        for (const div of allTileDivs) {
            const dr = parseInt(div.dataset.r);
            const dc = parseInt(div.dataset.c);
            const dLevel = parseInt(div.dataset.level);
            const key = dr + ',' + dc;

            // Проверяем, есть ли тайл с такими же координатами в текущем состоянии
            const match = currentTiles.find(t => t.r === dr && t.c === dc && t.level === dLevel);
            if (match && !usedKeys.has(key)) {
                existingDivs.set(key, div);
                usedKeys.add(key);
            } else {
                // Этот div больше не нужен или изменился уровень — убираем
                div.style.transition = 'transform 0.1s, opacity 0.15s';
                div.style.opacity = '0';
                div.style.transform = tileTransform(dr, dc) + ' scale(0.5)';
                setTimeout(() => div.remove(), 200);
            }
        }

        // Для тайлов, у которых сменился уровень (был другой уровень на тех же координатах) — 
        // создаём новые div'ы
        const toCreate = [];
        for (const tile of currentTiles) {
            const key = tile.r + ',' + tile.c;
            if (!existingDivs.has(key)) {
                toCreate.push(tile);
            }
        }

        // Обновляем существующие (позиция могла измениться)
        for (const [key, div] of existingDivs) {
            const [r, c] = key.split(',').map(Number);
            div.style.transform = tileTransform(r, c);
            div.dataset.r = r;
            div.dataset.c = c;
            // Убираем merged после отрисовки
            if (div.classList.contains('merged')) {
                setTimeout(() => div.classList.remove('merged'), 250);
            }
        }

        // Создаём новые
        for (const tile of toCreate) {
            const div = document.createElement('div');
            div.className = 'tile t-' + tile.level;
            div.textContent = NAMES[tile.level];
            div.dataset.r = tile.r;
            div.dataset.c = tile.c;
            div.dataset.level = tile.level;
            div.style.width = cellSize + 'px';
            div.style.height = cellSize + 'px';
            div.style.transform = tileTransform(tile.r, tile.c);
            tilesLayer.appendChild(div);
        }

        // Обновляем размеры всех тайлов (на случай ресайза)
        const allDivs = tilesLayer.querySelectorAll('.tile');
        for (const div of allDivs) {
            if (!div.style.width || div.style.width === '') {
                div.style.width = cellSize + 'px';
                div.style.height = cellSize + 'px';
            }
        }

        scoreEl.textContent = score;
    }

    function renderResize() {
        const { cellSize } = getTileSize();
        const allDivs = tilesLayer.querySelectorAll('.tile');
        for (const div of allDivs) {
            div.style.width = cellSize + 'px';
            div.style.height = cellSize + 'px';
            const r = parseInt(div.dataset.r);
            const c = parseInt(div.dataset.c);
            div.style.transform = tileTransform(r, c);
        }
    }

    // Спавним новый тайл
    function spawnTile() {
        const empty = [];
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                if (grid[r][c] === 0) empty.push({ r, c });
            }
        }
        if (empty.length === 0) return;

        const pos = empty[Math.floor(Math.random() * empty.length)];
        // Веса: чаще мелкие купюры
        const weights = [
            { level: 1, w: 35 },  // 1₽
            { level: 2, w: 25 },  // 2₽
            { level: 3, w: 15 },  // 5₽
            { level: 4, w: 12 },  // 10₽
            { level: 5, w: 8 },   // 100₽
            { level: 6, w: 4 },   // 500₽
            { level: 7, w: 1 },   // 1000₽ (редко)
        ];
        const total = weights.reduce((s, x) => s + x.w, 0);
        let rnd = Math.random() * total;
        let level = 1;
        for (const w of weights) {
            rnd -= w.w;
            if (rnd <= 0) { level = w.level; break; }
        }

        grid[pos.r][pos.c] = level;
    }

    function startTimer() {
        stopTimer();
        seconds = 0;
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            seconds++;
            updateTimerDisplay();
        }, 1000);
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function updateTimerDisplay() {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        timerEl.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    // Проверка, можно ли ходить
    function canMove() {
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                if (grid[r][c] === 0) return true;
                if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return true;
                if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return true;
            }
        }
        return false;
    }

    // Сдвиг и слияние строки влево
    function slideRow(row) {
        // Убираем нули
        let filtered = row.filter(v => v !== 0);
        let result = [];
        let i = 0;
        while (i < filtered.length) {
            if (i + 1 < filtered.length && filtered[i] === filtered[i + 1] && filtered[i] < MAX_LEVEL) {
                // Слияние
                result.push(filtered[i] + 1);
                score += (filtered[i] + 1) * 100;
                movedThisTurn = true;
                i += 2;
            } else {
                result.push(filtered[i]);
                i += 1;
            }
        }
        // Добиваем нулями
        while (result.length < SIZE) result.push(0);
        return result;
    }

    function moveLeft() {
        movedThisTurn = false;
        for (let r = 0; r < SIZE; r++) {
            const oldRow = [...grid[r]];
            const newRow = slideRow(oldRow);
            if (oldRow.join(',') !== newRow.join(',')) movedThisTurn = true;
            grid[r] = newRow;
        }
        return movedThisTurn;
    }

    function moveRight() {
        movedThisTurn = false;
        for (let r = 0; r < SIZE; r++) {
            const oldRow = [...grid[r]];
            const reversed = oldRow.slice().reverse();
            const slid = slideRow(reversed);
            const newRow = slid.reverse();
            if (oldRow.join(',') !== newRow.join(',')) movedThisTurn = true;
            grid[r] = newRow;
        }
        return movedThisTurn;
    }

    function moveUp() {
        movedThisTurn = false;
        for (let c = 0; c < SIZE; c++) {
            const oldCol = [];
            for (let r = 0; r < SIZE; r++) oldCol.push(grid[r][c]);
            const newCol = slideRow(oldCol);
            if (oldCol.join(',') !== newCol.join(',')) movedThisTurn = true;
            for (let r = 0; r < SIZE; r++) grid[r][c] = newCol[r];
        }
        return movedThisTurn;
    }

    function moveDown() {
        movedThisTurn = false;
        for (let c = 0; c < SIZE; c++) {
            const oldCol = [];
            for (let r = 0; r < SIZE; r++) oldCol.push(grid[r][c]);
            const reversed = oldCol.slice().reverse();
            const slid = slideRow(reversed);
            const newCol = slid.reverse();
            if (oldCol.join(',') !== newCol.join(',')) movedThisTurn = true;
            for (let r = 0; r < SIZE; r++) grid[r][c] = newCol[r];
        }
        return movedThisTurn;
    }

    function doMove(direction) {
        if (gameOver || won) return;

        const moved = (() => {
            switch (direction) {
                case 'left': return moveLeft();
                case 'right': return moveRight();
                case 'up': return moveUp();
                case 'down': return moveDown();
                default: return false;
            }
        })();

        if (moved) {
            spawnTile();
            render();

            // Проверка на Магната
            if (!won) {
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        if (grid[r][c] === MAX_LEVEL) {
                            won = true;
                            showOverlay('win');
                            return;
                        }
                    }
                }
            }

            if (!canMove()) {
                gameOver = true;
                setTimeout(() => showOverlay('lose'), 500);
            }
        }
    }

    function showOverlay(type) {
        stopTimer();
        const isWin = type === 'win';
        overlayContainer.innerHTML = `
            <div class="overlay" onclick="event.stopPropagation()">
                <div class="overlay-box ${isWin ? 'win' : 'lose'}">
                    <h2>${isWin ? '🏆 Магнат!' : '💸 Нет ходов'}</h2>
                    <p style="color:#aaa; margin:8px 0;">
                        ${isWin ? 'Ты собрал империю!' : 'Деньги кончились, кредит не дали.'}
                    </p>
                    <p style="font-size:1.2em; color:#f1c40f;">Баланс: ${score} ₽</p>
                    <p style="color:#aaa; font-size:0.9em;">Время: ${timerEl.textContent}</p>
                    <button onclick="Game.restart()">Начать заново</button>
                </div>
            </div>
        `;
    }

    function hideOverlay() {
        overlayContainer.innerHTML = '';
    }

    // === МУЗЫКА ===
    function startMusic() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        const notes = [261.63, 293.66, 329.63, 349.23, 392.00, 349.23, 329.63, 293.66]; // C D E F G F E D
        let noteIndex = 0;
        const bpm = 100;
        const intervalMs = 60000 / bpm;

        function playNote() {
            if (!musicEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = notes[noteIndex % notes.length];
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.35);
            noteIndex++;
        }

        playNote();
        musicInterval = setInterval(playNote, intervalMs);
        musicBtn.classList.remove('muted');
    }

    function stopMusic() {
        if (musicInterval) {
            clearInterval(musicInterval);
            musicInterval = null;
        }
        musicBtn.classList.add('muted');
    }

    function toggleMusic() {
        musicEnabled = !musicEnabled;
        if (musicEnabled) {
            startMusic();
        } else {
            stopMusic();
        }
    }

    // === УПРАВЛЕНИЕ ===
    let touchStartX = 0;
    let touchStartY = 0;
    const SWIPE_THRESHOLD = 30;

    document.addEventListener('touchstart', e => {
        if (gameOver || won) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.addEventListener('touchend', e => {
        if (gameOver || won) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);

        if (Math.max(absDx, absDy) < SWIPE_THRESHOLD) return;

        if (absDx > absDy) {
            doMove(dx > 0 ? 'right' : 'left');
        } else {
            doMove(dy > 0 ? 'down' : 'up');
        }
    });

    document.addEventListener('keydown', e => {
        if (gameOver || won) return;
        switch (e.key) {
            case 'ArrowLeft': e.preventDefault(); doMove('left'); break;
            case 'ArrowRight': e.preventDefault(); doMove('right'); break;
            case 'ArrowUp': e.preventDefault(); doMove('up'); break;
            case 'ArrowDown': e.preventDefault(); doMove('down'); break;
        }
    });

    window.addEventListener('resize', renderResize);

    // === ПУБЛИЧНЫЙ API ===
    function restart() {
        stopTimer();
        stopMusic();
        grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
        score = 0;
        won = false;
        gameOver = false;
        seconds = 0;
        hideOverlay();
        tilesLayer.innerHTML = '';

        // Стартовые 2 тайла
        const empty = [];
        for (let r = 0; r < SIZE; r++)
            for (let c = 0; c < SIZE; c++)
                empty.push({ r, c });
        const shuffled = empty.sort(() => Math.random() - 0.5);
        grid[shuffled[0].r][shuffled[0].c] = Math.random() < 0.6 ? 1 : 2;
        grid[shuffled[1].r][shuffled[1].c] = Math.random() < 0.6 ? 1 : 2;

        updateTimerDisplay();
        render();
        startTimer();

        if (musicEnabled) {
            startMusic();
        }
    }

    // Старт
    restart();

    return { restart, toggleMusic, doMove };
})();
</script>
