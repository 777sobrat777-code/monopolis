<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Мажор 2048</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #2B2D23;
  font-family: 'Georgia', serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}
#game {
  background: #4A5548;
  border-radius: 12px;
  padding: 16px;
  width: 100%;
  max-width: 420px;
  border: 2px solid #8B7355;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
#title {
  font-size: 22px;
  font-weight: bold;
  color: #E6D7B8;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}
#scores {
  display: flex;
  gap: 10px;
}
.score-box {
  background: #2B2D23;
  border-radius: 8px;
  padding: 6px 14px;
  text-align: center;
  border: 1px solid #8B7355;
}
.score-label {
  font-size: 10px;
  color: #E6D7B8;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.7;
}
.score-value {
  font-size: 18px;
  font-weight: bold;
  color: #E6D7B8;
}
#info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  gap: 10px;
}
#timer {
  color: #E6D7B8;
  font-size: 14px;
  background: #2B2D23;
  border-radius: 6px;
  padding: 6px 10px;
  border: 1px solid #8B7355;
}
#board {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, 1fr);
  gap: 8px;
  background: #2B2D23;
  border-radius: 8px;
  padding: 8px;
  position: relative;
  overflow: hidden;
  aspect-ratio: 1;
  border: 1px solid #8B7355;
}
.cell {
  background: #3A4034;
  border-radius: 6px;
  position: relative;
}
.tile {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 16px;
  border-radius: 6px;
  color: #E6D7B8;
  transition: left 0.12s ease, top 0.12s ease, transform 0.12s ease;
  z-index: 1;
}
.tile.merged {
  animation: mergePop 0.15s ease;
}
@keyframes mergePop {
  0% { transform: scale(0.85); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}
.tile[data-value="10"] { background: #5C6B4E; }
.tile[data-value="50"] { background: #6B7A52; }
.tile[data-value="100"] { background: #7A8F5C; }
.tile[data-value="500"] { background: #8B7F47; }
.tile[data-value="1000"] { background: #9B8B4A; }
.tile[data-value="5000"] { background: #A8904C; }
.tile[data-value="10000"] { background: #B89C52; }
.tile[data-value="50000"] { background: #C4A858; }
.tile[data-value="100000"] { background: #D4B862; }
.tile[data-value="500000"] { background: #E0C46A; }
.tile[data-value="1000000"] { background: #D4A840; }
.tile[data-value="5000000"] { background: #C89630; }
.tile[data-value="10000000"] { background: #B8860B; }
.tile[data-value="50000000"] { background: #A07500; }
.tile[data-value="100000000"] { background: #8B6914; }
.tile[data-value="500000000"] { background: #765A10; }
#controls {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
  gap: 8px;
}
button {
  background: #8B7F47;
  color: #E6D7B8;
  border: 1px solid #8B7355;
  border-radius: 8px;
  padding: 10px 18px;
  font-size: 14px;
  cursor: pointer;
  font-family: 'Georgia', serif;
  font-weight: bold;
  touch-action: manipulation;
}
button:active {
  background: #6B5F37;
}
button:disabled {
  opacity: 0.5;
  cursor: default;
}
#leaderboard {
  margin-top: 12px;
  background: #2B2D23;
  border-radius: 8px;
  padding: 10px;
  border: 1px solid #8B7355;
}
#leaderboard h3 {
  color: #E6D7B8;
  font-size: 14px;
  margin-bottom: 6px;
}
#leaderboard ol {
  color: #E6D7B8;
  font-size: 12px;
  padding-left: 20px;
  margin: 0;
}
#leaderboard li {
  margin: 2px 0;
  opacity: 0.85;
}
#nickname-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(43,45,35,0.95);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
}
#nickname-box {
  background: #4A5548;
  border-radius: 12px;
  padding: 30px;
  text-align: center;
  border: 2px solid #8B7355;
}
#nickname-box h2 {
  color: #E6D7B8;
  margin-bottom: 16px;
  font-size: 20px;
}
#nickname-input {
  background: #2B2D23;
  color: #E6D7B8;
  border: 1px solid #8B7355;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 18px;
  width: 200px;
  text-align: center;
  font-family: 'Georgia', serif;
  outline: none;
}
#nickname-input::placeholder {
  color: #8B7355;
}
#start-btn {
  margin-top: 14px;
  background: #8B7F47;
  color: #E6D7B8;
  border: 1px solid #8B7355;
  border-radius: 8px;
  padding: 10px 30px;
  font-size: 16px;
  cursor: pointer;
  font-family: 'Georgia', serif;
}
#start-btn:disabled {
  opacity: 0.5;
  cursor: default;
}
</style>
</head>
<body>

<div id="nickname-screen">
  <div id="nickname-box">
    <h2>Твой ник</h2>
    <input type="text" id="nickname-input" placeholder="Введи имя..." maxlength="16" autocomplete="off">
    <br>
    <button id="start-btn" disabled>Играть</button>
  </div>
</div>

<div id="game" style="display:none;">
  <div id="header">
    <div id="title">Мажор 2048</div>
    <div id="scores">
      <div class="score-box">
        <div class="score-label">Счёт</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">Лучший</div>
        <div class="score-value" id="best">0</div>
      </div>
    </div>
  </div>
  <div id="info">
    <div id="timer">⏱ 0с</div>
    <button id="music-btn" style="font-size:18px;padding:6px 10px;">♪</button>
  </div>
  <div id="board"></div>
  <div id="controls">
    <button id="undo-btn">↩ Назад</button>
    <button id="restart-btn">↻ Заново</button>
  </div>
  <div id="leaderboard">
    <h3>🏆 Лидеры</h3>
    <ol id="leader-list"><li>Пока пусто</li></ol>
  </div>
</div>

<script>
(function() {
  const SIZE = 5;
  const LEVELS = [
    { val: 10,    name: '10₽' },
    { val: 50,    name: '50₽' },
    { val: 100,   name: '100₽' },
    { val: 500,   name: '500₽' },
    { val: 1000,  name: '1 000₽' },
    { val: 5000,  name: '5 000₽' },
    { val: 10000, name: '10 000₽' },
    { val: 50000, name: '50 000₽ — Чемодан' },
    { val: 100000, name: '100 000₽ — Слиток' },
    { val: 500000, name: '500 000₽ — Авто' },
    { val: 1000000, name: '1 000 000₽ — Банк' },
    { val: 5000000, name: '5 000 000₽' },
    { val: 10000000, name: '10 000 000₽' },
    { val: 50000000, name: '50 000 000₽' },
    { val: 100000000, name: '100 000 000₽' },
    { val: 500000000, name: 'МАГНАТ' }
  ];
  const MAX_LEVEL = LEVELS.length - 1;

  const boardEl = document.getElementById('board');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const timerEl = document.getElementById('timer');
  const musicBtn = document.getElementById('music-btn');
  const undoBtn = document.getElementById('undo-btn');
  const restartBtn = document.getElementById('restart-btn');
  const leaderList = document.getElementById('leader-list');
  const nicknameScreen = document.getElementById('nickname-screen');
  const nicknameInput = document.getElementById('nickname-input');
  const startBtn = document.getElementById('start-btn');
  const gameDiv = document.getElementById('game');

  let board = [];
  let score = 0;
  let best = 0;
  let history = [];
  let tiles = [];
  let nickname = '';
  let timerSec = 0;
  let timerInterval = null;
  let audioCtx = null;
  let musicOn = false;
  let musicOsc = null;
  let musicGain = null;
  let gameOver = false;

  // Cell size tracking
  let cellSize = 0;
  let gapSize = 8;
  let padSize = 8;

  function calcSizes() {
    const boardWidth = boardEl.clientWidth;
    cellSize = (boardWidth - padSize*2 - gapSize*(SIZE-1)) / SIZE;
  }

  function pos(index) {
    const row = Math.floor(index / SIZE);
    const col = index % SIZE;
    return {
      left: padSize + col * (cellSize + gapSize),
      top: padSize + row * (cellSize + gapSize)
    };
  }

  function tileSize() {
    return cellSize;
  }

  function createTile(index, value, merged) {
    const p = pos(index);
    const div = document.createElement('div');
    div.className = 'tile' + (merged ? ' merged' : '');
    div.style.width = tileSize() + 'px';
    div.style.height = tileSize() + 'px';
    div.style.left = p.left + 'px';
    div.style.top = p.top + 'px';
    div.style.lineHeight = tileSize() + 'px';
    div.setAttribute('data-value', value);
    div.textContent = levelName(value);
    boardEl.appendChild(div);
    return div;
  }

  function levelName(value) {
    const lvl = LEVELS.find(l => l.val === value);
    return lvl ? lvl.name : value + '₽';
  }

  function levelIndex(value) {
    return LEVELS.findIndex(l => l.val === value);
  }

  function renderAll(mergedIndices) {
    // Remove all tiles
    tiles.forEach(t => t.remove());
    tiles = [];
    // Recreate
    for (let i = 0; i < board.length; i++) {
      if (board[i] !== 0) {
        const isMerged = mergedIndices && mergedIndices.includes(i);
        const t = createTile(i, board[i], isMerged);
        tiles.push(t);
      }
    }
  }

  function initBoard() {
    board = new Array(SIZE * SIZE).fill(0);
    tiles.forEach(t => t.remove());
    tiles = [];
    score = 0;
    gameOver = false;
    history = [];
    timerSec = 0;
    updateScore();
    updateBest();
    updateTimer();
    spawnTile();
    spawnTile();
    renderAll();
  }

  function spawnTile() {
    const empty = board.reduce((acc, v, i) => v === 0 ? acc.concat(i) : acc, []);
    if (empty.length === 0) return;
    const idx = empty[Math.floor(Math.random() * empty.length)];
    // Dynamic spawn — higher score = fatter drops
    const maxLvl = Math.min(2 + Math.floor(score / 5000), MAX_LEVEL);
    const lvl = Math.min(Math.floor(Math.random() * (maxLvl + 1)), MAX_LEVEL);
    board[idx] = LEVELS[lvl].val;
  }

  function updateScore() {
    scoreEl.textContent = score;
    if (score > best) {
      best = score;
      localStorage.setItem('mazhor2048_best_' + nickname, best);
      updateBest();
    }
  }

  function updateBest() {
    const stored = localStorage.getItem('mazhor2048_best_' + nickname);
    bestEl.textContent = stored ? parseInt(stored) : best;
  }

  function updateTimer() {
    timerEl.textContent = '⏱ ' + timerSec + 'с';
  }

  function pushHistory() {
    history.push({ board: [...board], score: score, timer: timerSec });
    if (history.length > 10) history.shift();
  }

  function undo() {
    if (history.length === 0 || gameOver) return;
    const state = history.pop();
    board = state.board;
    score = state.score;
    timerSec = state.timer;
    updateScore();
    updateTimer();
    gameOver = false;
    renderAll();
  }

  function move(dir) {
    if (gameOver) return;
    pushHistory();

    const oldBoard = [...board];
    let moved = false;
    let mergedIndices = [];
    const vectors = {
      left:  { step: 1,   start: 0, end: SIZE, inc: 1,  getRow: (r) => r * SIZE, getIdx: (r, c) => r * SIZE + c },
      right: { step: -1,  start: SIZE-1, end: -1, inc: -1, getRow: (r) => r * SIZE + SIZE - 1, getIdx: (r, c) => r * SIZE + c },
      up:    { step: SIZE, start: 0, end: SIZE, inc: 1,  getCol: (c) => c, getIdx: (r, c) => r * SIZE + c },
      down:  { step: -SIZE, start: SIZE-1, end: -1, inc: -1, getCol: (c) => (SIZE-1)*SIZE + c, getIdx: (r, c) => r * SIZE + c }
    };

    const v = vectors[dir];
    for (let i = 0; i < SIZE; i++) {
      const line = [];
      for (let j = v.start; j !== v.end; j += v.inc) {
        const idx = (dir === 'left' || dir === 'right') ? v.getIdx(i, j) : v.getIdx(j, i);
        line.push(board[idx]);
      }
      const merged = mergeRow(line);
      for (let j = 0; j < SIZE; j++) {
        const idx = (dir === 'left' || dir === 'right') ? v.getIdx(i, j) : v.getIdx(j, i);
        if (board[idx] !== merged[j]) moved = true;
        board[idx] = merged[j];
        if (merged[j] !== 0 && merged[j] !== oldBoard[idx] && merged[j] > oldBoard[idx]) {
          mergedIndices.push(idx);
          score += merged[j];
        }
      }
    }

    if (moved) {
      spawnTile();
      updateScore();
      renderAll(mergedIndices);
      if (isGameOver()) {
        gameOver = true;
        saveToLeaderboard();
        updateLeaderboard();
        alert('Игра окончена! Счёт: ' + score);
      }
    }
  }

  function mergeRow(row) {
    let filtered = row.filter(v => v !== 0);
    const result = [];
    for (let i = 0; i < filtered.length; i++) {
      if (i < filtered.length - 1 && filtered[i] === filtered[i+1]) {
        const idx = levelIndex(filtered[i]);
        const nextIdx = Math.min(idx + 1, MAX_LEVEL);
        result.push(LEVELS[nextIdx].val);
        i++;
      } else {
        result.push(filtered[i]);
      }
    }
    while (result.length < SIZE) result.push(0);
    return result;
  }

  function isGameOver() {
    if (board.some(v => v === 0)) return false;
    // Check for possible merges
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const idx = r * SIZE + c;
        const val = board[idx];
        if (c < SIZE - 1 && board[idx + 1] === val) return false;
        if (r < SIZE - 1 && board[idx + SIZE] === val) return false;
      }
    }
    return true;
  }

  // Touch/swipe handling
  let touchStartX = 0, touchStartY = 0;
  boardEl.addEventListener('touchstart', function(e) {
    e.preventDefault();
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: false });

  boardEl.addEventListener('touchend', function(e) {
    e.preventDefault();
    if (gameOver) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    const threshold = 30;
    if (Math.max(absDx, absDy) < threshold) return;
    if (absDx > absDy) {
      move(dx > 0 ? 'right' : 'left');
    } else {
      move(dy > 0 ? 'down' : 'up');
    }
  }, { passive: false });

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (gameOver) return;
    const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
    if (map[e.key]) {
      e.preventDefault();
      move(map[e.key]);
    }
  });

  // Music
  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function startMusic() {
    if (!audioCtx) initAudio();
    if (musicOn) return;
    musicOn = true;
    musicBtn.textContent = '♪';
    playNote();
  }

  function stopMusic() {
    musicOn = false;
    musicBtn.textContent = '♫';
    if (musicOsc) { musicOsc.stop(); musicOsc = null; }
  }

  function playNote() {
    if (!musicOn) return;
    if (musicOsc) { try { musicOsc.stop(); } catch(e) {} }
    musicGain = audioCtx.createGain();
    musicGain.gain.value = 0.06;
    musicGain.connect(audioCtx.destination);
    musicOsc = audioCtx.createOscillator();
    musicOsc.type = 'triangle';
    const notes = [261, 293, 329, 349, 392, 440, 493, 523];
    musicOsc.frequency.value = notes[Math.floor(Math.random() * notes.length)];
    musicOsc.connect(musicGain);
    musicOsc.start();
    musicOsc.stop(audioCtx.currentTime + 0.3);
    musicOsc.onended = function() {
      musicOsc = null;
      if (musicOn) setTimeout(playNote, 350);
    };
  }

  musicBtn.addEventListener('click', function() {
    initAudio();
    if (musicOn) stopMusic();
    else startMusic();
  });

  // Timer
  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(function() {
      timerSec++;
      updateTimer();
    }, 1000);
  }

  // Buttons
  undoBtn.addEventListener('click', function() { undo(); });
  restartBtn.addEventListener('click', function() {
    initBoard();
    updateLeaderboard();
  });

  // Leaderboard
  function saveToLeaderboard() {
    const key = 'mazhor2048_lb';
    let lb = JSON.parse(localStorage.getItem(key) || '[]');
    lb.push({ nick: nickname, score: score, time: timerSec, date: new Date().toLocaleDateString() });
    lb.sort((a, b) => b.score - a.score);
    lb = lb.slice(0, 10);
    localStorage.setItem(key, JSON.stringify(lb));
  }

  function updateLeaderboard() {
    const key = 'mazhor2048_lb';
    const lb = JSON.parse(localStorage.getItem(key) || '[]');
    leaderList.innerHTML = lb.length === 0
      ? '<li>Пока пусто</li>'
      : lb.map(e => '<li>' + e.nick + ' — ' + e.score + ' (' + e.time + 'с)</li>').join('');
  }

  // Nickname screen
  nicknameInput.addEventListener('input', function() {
    startBtn.disabled = nicknameInput.value.trim().length < 2;
  });

  startBtn.addEventListener('click', function() {
    nickname = nicknameInput.value.trim();
    if (nickname.length < 2) return;
    nicknameScreen.style.display = 'none';
    gameDiv.style.display = 'block';
    calcSizes();
    initBoard();
    updateLeaderboard();
    startTimer();
  });

  // Handle resize
  window.addEventListener('resize', function() {
    if (gameDiv.style.display !== 'none') {
      calcSizes();
      renderAll();
    }
  });

  // Init best display
  updateBest();

})();
</script>
</body>
</html>
