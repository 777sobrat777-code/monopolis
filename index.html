<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Денежное Слияние 2048</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
  touch-action: none;
}
.game-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  width: 100%;
  max-width: 420px;
  padding: 16px;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  color: #fff;
}
.title {
  font-size: 28px;
  font-weight: 900;
  color: #f5c518;
  text-shadow: 0 0 10px rgba(245,197,24,0.4);
}
.score-panel {
  display: flex;
  gap: 8px;
}
.score-box {
  background: #16213e;
  border-radius: 8px;
  padding: 6px 14px;
  text-align: center;
}
.score-label {
  font-size: 10px;
  color: #aaa;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.score-value {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
}
.timer-box {
  background: #16213e;
  border-radius: 8px;
  padding: 6px 14px;
  text-align: center;
}
.timer-value {
  font-size: 22px;
  font-weight: 700;
  color: #f5c518;
}
.controls {
  display: flex;
  gap: 8px;
  width: 100%;
}
.btn {
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s;
}
.btn:active { transform: scale(0.95); }
.btn-new { background: #f5c518; color: #1a1a2e; }
.btn-sound { background: #16213e; color: #fff; }
.btn-sound.on { background: #f5c518; color: #1a1a2e; }
.board-wrapper {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
}
.board-bg {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-template-rows: repeat(6, 1fr);
  gap: 6px;
  padding: 6px;
  background: #0f3460;
  border-radius: 12px;
}
.cell-bg {
  background: #16213e;
  border-radius: 8px;
}
.tiles-layer {
  position: absolute;
  inset: 0;
  padding: 6px;
}
.tile {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  font-weight: 700;
  color: #fff;
  transition: left 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              top 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  z-index: 1;
}
.tile.merged {
  animation: pop 0.2s ease-out;
}
.tile.new {
  animation: appear 0.2s ease-out;
}
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
@keyframes appear {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  border-radius: 12px;
  z-index: 10;
}
.overlay-text {
  font-size: 32px;
  font-weight: 900;
  color: #f5c518;
}
.overlay.hidden { display: none; }
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="header">
    <div class="title">💰 Слияние</div>
    <div class="score-panel">
      <div class="score-box">
        <div class="score-label">Счёт</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="timer-box">
        <div class="score-label">⏱ Время</div>
        <div class="timer-value" id="timer">00:00</div>
      </div>
    </div>
  </div>
  <div class="controls">
    <button class="btn btn-new" onclick="newGame()">Новая игра</button>
    <button class="btn btn-sound on" id="soundBtn" onclick="toggleSound()">♪ Звук</button>
  </div>
  <div class="board-wrapper" id="boardWrapper">
    <div class="board-bg" id="boardBg"></div>
    <div class="tiles-layer" id="tilesLayer"></div>
    <div class="overlay hidden" id="overlay">
      <div class="overlay-text" id="overlayText"></div>
      <button class="btn btn-new" onclick="newGame()">Заново</button>
    </div>
  </div>
</div>
<script>
// ---- AUDIO ----
let audioCtx = null;
let soundOn = true;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playNote(freq, dur, type = 'triangle', vol = 0.08) {
  if (!soundOn || !audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function playMerge(level) {
  const base = 220 + level * 30;
  playNote(base, 0.12, 'triangle', 0.06);
  setTimeout(() => playNote(base * 1.25, 0.1, 'triangle', 0.04), 60);
}
function playMove() { playNote(180, 0.05, 'sine', 0.03); }
function playWin() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playNote(f, 0.2, 'triangle', 0.1), i * 120));
}
function playLose() {
  [300, 250, 200].forEach((f, i) => setTimeout(() => playNote(f, 0.3, 'sawtooth', 0.05), i * 150));
}
function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundBtn').className = 'btn btn-sound' + (soundOn ? ' on' : '');
  if (soundOn) initAudio();
}

// ---- DATA ----
const TILES = [
  { name: '1₽',      bg: '#2d6a4f', color: '#fff', value: 1 },
  { name: '2₽',      bg: '#40916c', color: '#fff', value: 2 },
  { name: '5₽',      bg: '#52b788', color: '#fff', value: 3 },
  { name: '10₽',     bg: '#1b4332', color: '#fff', value: 4 },
  { name: '100₽',    bg: '#1e6091', color: '#fff', value: 5 },
  { name: '500₽',    bg: '#1a759f', color: '#fff', value: 6 },
  { name: '1000₽',   bg: '#168aad', color: '#fff', value: 7 },
  { name: '2000₽',   bg: '#184e77', color: '#fff', value: 8 },
  { name: '5000₽',   bg: '#9b2226', color: '#fff', value: 9 },
  { name: '10000₽',  bg: '#ae2012', color: '#fff', value: 10 },
  { name: '🧳',      bg: '#8b5e3c', color: '#fff', value: 11 },
  { name: '✨🧳',    bg: '#d4a017', color: '#1a1a2e', value: 12 },
  { name: '🥇',      bg: '#f5c518', color: '#1a1a2e', value: 13 },
  { name: '🥇🥇',   bg: '#ffd700', color: '#1a1a2e', value: 14 },
  { name: '🚗',      bg: '#1c1c1c', color: '#ccc', value: 15 },
  { name: '🏦',      bg: '#5c4d7d', color: '#fff', value: 16 },
  { name: '👑',      bg: '#e74c3c', color: '#fff', value: 17 },
];
const SIZE = 6;
const WIN_LEVEL = 17;

let grid = [];       // grid[row][col] = tile level (0 = empty)
let score = 0;
let bestScore = parseInt(localStorage.getItem('merge2048best')) || 0;
let gameOver = false;
let won = false;

let timerSec = 0;
let timerInterval = null;
let boardW = 0;
let cellSize = 0;
let gap = 0;
let padding = 0;

// touch
let touchStartX = 0, touchStartY = 0;
const SWIPE_THRESH = 30;

// ---- INIT ----
function initBoard() {
  grid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  score = 0;
  gameOver = false;
  won = false;
  timerSec = 0;
  clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('overlay').classList.add('hidden');
  updateScore();
  updateTimer();
}

function newGame() {
  initBoard();
  spawnTile();
  spawnTile();
  renderAll();
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!gameOver) {
      timerSec++;
      updateTimer();
    }
  }, 1000);
}

function updateTimer() {
  const m = Math.floor(timerSec / 60).toString().padStart(2, '0');
  const s = (timerSec % 60).toString().padStart(2, '0');
  document.getElementById('timer').textContent = m + ':' + s;
}

function updateScore() {
  document.getElementById('score').textContent = score;
}

function spawnTile() {
  const empty = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] === 0) empty.push({r, c});
  if (empty.length === 0) return;
  const {r, c} = empty[Math.floor(Math.random() * empty.length)];
  // взвешенный рандом: 1₽(40%), 2₽(25%), 5₽(15%), 10₽(10%), 100₽(7%), 500₽(3%)
  const roll = Math.random();
  let level;
  if (roll < 0.40) level = 1;
  else if (roll < 0.65) level = 2;
  else if (roll < 0.80) level = 3;
  else if (roll < 0.90) level = 4;
  else if (roll < 0.97) level = 5;
  else level = 6;
  grid[r][c] = level;
}

function canMove() {
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (grid[r][c] === 0) return true;
      if (c < SIZE - 1 && grid[r][c] === grid[r][c+1]) return true;
      if (r < SIZE - 1 && grid[r][c] === grid[r+1][c]) return true;
    }
  }
  return false;
}

// ---- MOVE LOGIC ----
function move(dir) {
  if (gameOver) return false;
  let moved = false;
  let merges = [];
  const oldGrid = grid.map(row => [...row]);

  if (dir === 'left') {
    for (let r = 0; r < SIZE; r++) {
      const line = grid[r].filter(v => v !== 0);
      const { newLine, merges: m } = mergeLine(line);
      while (newLine.length < SIZE) newLine.push(0);
      grid[r] = newLine;
      merges.push(...m.map(c => ({r, c})));
    }
  } else if (dir === 'right') {
    for (let r = 0; r < SIZE; r++) {
      const line = grid[r].filter(v => v !== 0);
      line.reverse();
      const { newLine, merges: m } = mergeLine(line);
      while (newLine.length < SIZE) newLine.push(0);
      newLine.reverse();
      while (newLine.length < SIZE) newLine.unshift(0);
      grid[r] = newLine;
      merges.push(...m.map(c => ({r, c: SIZE - 1 - c})));
    }
  } else if (dir === 'up') {
    for (let c = 0; c < SIZE; c++) {
      const line = [];
      for (let r = 0; r < SIZE; r++) if (grid[r][c] !== 0) line.push(grid[r][c]);
      const { newLine, merges: m } = mergeLine(line);
      while (newLine.length < SIZE) newLine.push(0);
      for (let r = 0; r < SIZE; r++) grid[r][c] = newLine[r];
      merges.push(...m.map(r => ({r, c})));
    }
  } else if (dir === 'down') {
    for (let c = 0; c < SIZE; c++) {
      const line = [];
      for (let r = 0; r < SIZE; r++) if (grid[r][c] !== 0) line.push(grid[r][c]);
      line.reverse();
      const { newLine, merges: m } = mergeLine(line);
      while (newLine.length < SIZE) newLine.push(0);
      newLine.reverse();
      while (newLine.length < SIZE) newLine.unshift(0);
      for (let r = 0; r < SIZE; r++) grid[r][c] = newLine[r];
      merges.push(...m.map(r => ({r: SIZE - 1 - r, c})));
    }
  }

  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] !== oldGrid[r][c]) moved = true;

  if (!moved) return false;

  merges.forEach(({r, c}) => {
    const lv = grid[r][c];
    if (lv <= TILES.length) score += TILES[lv - 1].value * 10;
    playMerge(lv);
  });
  if (merges.length === 0) playMove();

  spawnTile();
  const newMoves = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] !== oldGrid[r][c]) newMoves.push({r, c});

  renderAll(merges, newMoves);
  updateScore();
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('merge2048best', bestScore);
  }
  checkWin();
  if (!canMove()) {
    gameOver = true;
    clearInterval(timerInterval);
    setTimeout(() => showOverlay(false), 400);
  }
  return true;
}

function mergeLine(line) {
  const newLine = [];
  const merges = [];
  let i = 0;
  while (i < line.length) {
    if (i < line.length - 1 && line[i] === line[i+1]) {
      const merged = line[i] + 1;
      newLine.push(merged);
      merges.push(newLine.length - 1);
      i += 2;
    } else {
      newLine.push(line[i]);
      i++;
    }
  }
  return { newLine, merges };
}

function checkWin() {
  if (won) return;
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] >= WIN_LEVEL) {
        won = true;
        gameOver = true;
        clearInterval(timerInterval);
        playWin();
        setTimeout(() => showOverlay(true), 500);
        return;
      }
}

function showOverlay(win) {
  const ov = document.getElementById('overlay');
  ov.classList.remove('hidden');
  document.getElementById('overlayText').textContent = win ? '👑 МАГНАТ!' : '💀 Конец';
}

// ---- RENDER ----
function buildBg() {
  const bg = document.getElementById('boardBg');
  bg.innerHTML = '';
  for (let i = 0; i < SIZE * SIZE; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell-bg';
    bg.appendChild(cell);
  }
}

function measureBoard() {
  const wrapper = document.getElementById('boardWrapper');
  boardW = wrapper.clientWidth;
  padding = 6;
  gap = 6;
  cellSize = (boardW - padding * 2 - gap * (SIZE - 1)) / SIZE;
}

function renderAll(merges = [], newTiles = []) {
  measureBoard();
  const layer = document.getElementById('tilesLayer');
  layer.innerHTML = '';
  const mergeSet = new Set(merges.map(p => p.r * SIZE + p.c));
  const newSet = new Set(newTiles.map(p => p.r * SIZE + p.c));

  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const lv = grid[r][c];
      if (lv === 0) continue;
      const tile = document.createElement('div');
      tile.className = 'tile';
      const key = r * SIZE + c;
      if (mergeSet.has(key)) tile.classList.add('merged');
      if (newSet.has(key)) tile.classList.add('new');
      const td = TILES[Math.min(lv - 1, TILES.length - 1)];
      tile.style.background = td.bg;
      tile.style.color = td.color;
      tile.style.left = (padding + c * (cellSize + gap)) + 'px';
      tile.style.top = (padding + r * (cellSize + gap)) + 'px';
      tile.style.width = cellSize + 'px';
      tile.style.height = cellSize + 'px';
      tile.style.fontSize = Math.max(12, cellSize * 0.28) + 'px';
      tile.textContent = td.name;
      layer.appendChild(tile);
    }
  }
}

// ---- INPUT ----
function handleSwipe(dx, dy) {
  if (Math.abs(dx) < SWIPE_THRESH && Math.abs(dy) < SWIPE_THRESH) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    move(dx > 0 ? 'right' : 'left');
  } else {
    move(dy > 0 ? 'down' : 'up');
  }
}

document.addEventListener('DOMContentLoaded', () => {
  buildBg();
  initBoard();
  spawnTile();
  spawnTile();
  renderAll();
  // не стартуем таймер пока не сделан первый ход
});

document.addEventListener('touchstart', e => {
  initAudio();
  if (e.target.closest('button')) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: false});

document.addEventListener('touchend', e => {
  if (e.target.closest('button')) return;
  const dx = (e.changedTouches[0]?.clientX || touchStartX) - touchStartX;
  const dy = (e.changedTouches[0]?.clientY || touchStartY) - touchStartY;
  handleSwipe(dx, dy);
  // старт таймера после первого хода
  if (!timerInterval && !gameOver) startTimer();
});

document.addEventListener('keydown', e => {
  initAudio();
  const map = {
    ArrowLeft: 'left', ArrowRight: 'right',
    ArrowUp: 'up', ArrowDown: 'down',
  };
  if (map[e.key]) {
    e.preventDefault();
    move(map[e.key]);
    if (!timerInterval && !gameOver) startTimer();
  }
});

// Кнопка "Новая игра" уже в onclick
window.newGame = newGame;
window.toggleSound = toggleSound;

// ресайз
window.addEventListener('resize', () => renderAll());
</script>
</body>
</html>
