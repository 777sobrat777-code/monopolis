<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Денежное Слияние: Drag & Drop</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #2c3e50; color: white; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; margin: 0; height: 100vh; overflow: hidden;
        }
        h1 { margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        #score-board { 
            font-size: 1.8em; margin-bottom: 20px; 
            background: rgba(0,0,0,0.4); padding: 15px 30px; 
            border-radius: 50px; border: 2px solid white; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(5, 100px); 
            gap: 8px; margin-bottom: 30px; 
            padding: 10px; background: #34495e; 
            border-radius: 12px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            position: relative;
        }
        
        .cell { 
            width: 100px; height: 100px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 1.1em; cursor: grab; 
            border-radius: 8px; transition: all 0.2s ease; 
            user-select: none; position: relative; z-index: 2;
            box-sizing: border-box;
            background-color: #4a6278; /* Цвет по умолчанию */
        }
        .cell:active { cursor: grabbing; }
        .cell.dragging-source { 
            opacity: 0.5; transform: scale(0.95); 
            pointer-events: none; z-index: 1;
        }
        .cell.possible-target { 
            filter: brightness(1.3); border: 3px solid yellow; 
            z-index: 3; box-shadow: 0 0 15px yellow;
        }

        /* Цвета уровней денег */
        .lvl-1 { background: #2ecc71; color: black; } 
        .lvl-2 { background: #27ae60; color: white; } 
        .lvl-3 { background: #f1c40f; color: black; } 
        .lvl-4 { background: #f39c12; color: white; } 
        .lvl-5 { background: #e67e22; color: white; } 
        .lvl-6 { background: #c0392b; color: white; } 
        .lvl-7 { background: #9b59b6; color: white; } 
        .lvl-8 { background: #34495e; color: gold; border: 2px solid gold; } 
        .lvl-9 { background: linear-gradient(45deg, #7f8c8d, #95a5a6); color: silver; font-style: italic; } 
        .lvl-10 { background: #bdc3c7; color: black; border: 2px solid #333; } 
        .lvl-11 { background: #d35400; color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; } 

        /* Отрицательные объекты */
        .thief { background: #2c3e50; color: red; border: 3px dashed red; font-size: 0.9em; text-align: center; padding: 5px; } 
        .debt { background: #555; color: yellow; border: 2px solid yellow; font-size: 0.8em; } 

        /* Нейтральные объекты */
        .safe { background: #1abc9c; color: white; border: 3px solid white; font-size: 0.9em; } 
        .empty { background: transparent; color: #555; border: 2px dashed #555; pointer-events: none; } 

        button { 
            padding: 15px 40px; font-size: 1.2em; margin-top: 10px; cursor: pointer; 
            background: white; color: #2c3e50; border: none; border-radius: 50px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-weight: bold;
        }
        button:hover { background: #f1c40f; transform: translateY(-2px); }

        .hint { margin-top: 10px; color: #aaa; font-size: 0.9em; text-align: center; }
    </style>
</head>
<body>

    <h1>Денежное Слияние</h1>
    <div id="score-board">Баланс: <span id="score">0</span> ₽</div>
    
    <div class="grid" id="game-grid"></div>
    <button onclick="restartGame()">Начать заново</button>
    <p class="hint">Зажми фишку и перетащи на соседнюю клетку!</p>

<script>
    const GRID_SIZE = 5;
    let grid = []; 
    let score = 0;
    const scoreEl = document.getElementById('score');
    
    // Переменные для Drag-and-Drop
    let activeDragIndex = null;
    let isDragging = false;

    const MONEY_LEVELS = [
        { val: 1, name: "1₽", class: "lvl-1" },
        { val: 2, name: "2₽", class: "lvl-2" },
        { val: 5, name: "5₽", class: "lvl-3" },
        { val: 10, name: "10₽", class: "lvl-4" },
        { val: 100, name: "100₽", class: "lvl-5" },
        { val: 500, name: "500₽", class: "lvl-6" },
        { val: 1000, name: "1000₽", class: "lvl-7" },
        { val: 10000, name: "10к₽", class: "lvl-8" },
        { val: 0, name: "Чемодан", class: "lvl-9" }, 
        { val: 0, name: "Банк", class: "lvl-10" },
        { val: 999999, name: "Президент", class: "lvl-11" }
    ];

    const NEGATIVE_TYPES = [
        { type: 'thief', name: "Вор", class: "thief", effect: "steal" },
        { type: 'debt', name: "Долг", class: "debt", effect: "lose_money" }
    ];

    const NEUTRAL_TYPES = [
        { type: 'safe', name: "Копилка", class: "safe", effect: "protect" },
        { type: 'empty', name: "", class: "empty", effect: "none" }
    ];

    function initGame() {
        grid = [];
        score = 0;
        updateScore();
        for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
            grid.push(generateRandomCell());
        }
        renderGrid();
    }

    function generateRandomCell() {
        const rand = Math.random();
        if (rand < 0.65) {
            const lvl = Math.floor(Math.random() * 4);
            return { ...MONEY_LEVELS[lvl], type: 'money', level: lvl };
        } else if (rand < 0.85) {
            const neg = NEGATIVE_TYPES[Math.floor(Math.random() * NEGATIVE_TYPES.length)];
            return { ...neg, level: -1 };
        } else {
            const neu = NEUTRAL_TYPES[Math.floor(Math.random() * NEUTRAL_TYPES.length)];
            return { ...neu, level: -2 };
        }
    }

    function renderGrid() {
        const gridEl = document.getElementById('game-grid');
        gridEl.innerHTML = '';

        grid.forEach((cellData, index) => {
            const div = document.createElement('div');
            div.className = `cell ${cellData.class}`;
            
            if (cellData.type === 'empty') {
                div.classList.add('empty');
                div.innerHTML = "&nbsp;";
            } else {
                div.innerText = cellData.name;
            }

            // Обработчики событий
            div.addEventListener('mousedown', (e) => startDrag(index, e));
            div.addEventListener('touchstart', (e) => { e.preventDefault(); startDrag(index, e); });
            
            // Движение (для подсветки)
            div.addEventListener('mousemove', (e) => handleDragMove(index, e));
            div.addEventListener('touchmove', (e) => { e.preventDefault(); handleDragMove(index, e); });

            gridEl.appendChild(div);
        });

        // Глобальные слушатели для отпускания кнопки
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);
    }

    function updateScore() {
        scoreEl.innerText = score;
    }

    // --- Логика Drag and Drop ---

    function startDrag(index, event) {
        if (grid[index].type === 'empty' || isDragging) return;
        
        isDragging = true;
        activeDragIndex = index;
        
        const cells = document.querySelectorAll('.cell');
        cells[index].classList.add('dragging-source');
        
        highlightNeighbors(index);
    }

    function highlightNeighbors(startIndex) {
        const cells = document.querySelectorAll('.cell');
        cells.forEach((cell, idx) => {
            // Подсвечиваем только соседей, которые не пустые
            if (idx !== startIndex && grid[idx].type !== 'empty' && areNeighbors(startIndex, idx)) {
                cell.classList.add('possible-target');
            } else {
                cell.classList.remove('possible-target');
            }
        });
    }

    function handleDragMove(targetIndex, event) {
        if (!isDragging) return;

        const cells = document.querySelectorAll('.cell');
        // Сбрасываем подсветку со всех, чтобы заново подсветить ту, над которой мышь
        cells.forEach(c => c.classList.remove('possible-target'));

        if (areNeighbors(activeDragIndex, targetIndex) && grid[targetIndex].type !== 'empty') {
            cells[targetIndex].classList.add('possible-target');
        }
    }

    function endDrag() {
        if (!isDragging || activeDragIndex === null) return;

        const cells = document.querySelectorAll('.cell');
        const startCellData = grid[activeDragIndex];
        
        let targetIndex = -1;
        // Ищем клетку, которая сейчас подсвечена желтым
        cells.forEach((cell, idx) => {
            if (cell.classList.contains('possible-target')) {
                targetIndex = idx;
            }
        });

        // Убираем все визуальные эффекты перетаскивания
        cells.forEach(c => {
            c.classList.remove('dragging-source');
            c.classList.remove('possible-target');
        });

        // Если мы отпустили кнопку над допустимой соседней клеткой -> сливаем
        if (targetIndex !== -1 && targetIndex !== activeDragIndex) {
            processMerge(activeDragIndex, targetIndex, startCellData, grid[targetIndex]);
        }

        isDragging = false;
        activeDragIndex = null;
        renderGrid(); // Перерисовываем поле после изменений
    }

    function areNeighbors(idx1, idx2) {
        const r1 = Math.floor(idx1 / GRID_SIZE);
        const c1 = idx1 % GRID_SIZE;
        const r2 = Math.floor(idx2 / GRID_SIZE);
        const c2 = idx2 % GRID_SIZE;
        return Math.abs(r1 - r2) + Math.abs(c1 - c2) === 1;
    }

    function processMerge(idxA, idxB, cellA, cellB) {
        // 1. Деньги + Деньги (одинаковый уровень)
        if (cellA.type === 'money' && cellB.type === 'money' && cellA.level === cellB.level) {
            const nextLevel = cellA.level + 1;
            if (nextLevel < MONEY_LEVELS.length) {
                const newCell = { ...MONEY_LEVELS[nextLevel], type: 'money', level: nextLevel };
                grid[idxA] = newCell; 
                grid[idxB] = { ...NEUTRAL_TYPES.find(n => n.type === 'empty'), type: 'empty', level: -2 };

                if (newCell.val > 0) {
                    score += newCell.val;
                    updateScore();
                }
                alert(`Отлично! Получен уровень: ${newCell.name}`);
            } else {
                alert("Максимальный уровень достигнут!");
            }
        } 
        // 2. Вор + Деньги
        else if ((cellA.effect === "steal" && cellB.type === 'money') || (cellB.effect === "steal" && cellA.type === 'money')) {
            alert("Вор украл ваши деньги!");
            const moneyIdx = (cellA.effect === "steal") ? idxB : idxA;
            grid[moneyIdx] = { ...NEUTRAL_TYPES.find(n => n.type === 'empty'), type: 'empty', level: -2 };
            // Вор остается
        }
        // 3. Долг + Деньги
        else if ((cellA.effect === "lose_money" && cellB.type === 'money') || (cellB.effect === "lose_money" && cellA.type === 'money')) {
            alert("Вы потеряли деньги из-за долга!");
            const moneyVal = (cellA.effect === "lose_money") ? cellB.val : cellA.val;
            score -= moneyVal;
            updateScore();
            const moneyIdx = (cellA.effect === "lose_money") ? idxB : idxA;
            grid[moneyIdx] = { ...NEUTRAL_TYPES.find(n => n.type === 'empty'), type: 'empty', level: -2 };
        }
        // 4. Копилка + Деньги
        else if ((cellA.effect === "protect" && cellB.type === 'money') || (cellB.effect === "protect" && cellA.type === 'money')) {
            alert("Копилка сохранила ваши сбережения!");
            const safeIdx = (cellA.effect === "protect") ? idxA : idxB;
            // Копилка исчезает, деньги остаются на месте
            grid[safeIdx] = { ...NEUTRAL_TYPES.find(n => n.type === 'empty'), type: 'empty', level: -2 }; 
        }
        else {
            alert("Нельзя соединить эти объекты! Они должны быть одинаковыми деньгами или иметь спец-
                 function restartGame() {
        initGame();
    }

    initGame();
</script>
</body>
</html>
