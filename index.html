<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Денежное Слияние</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        /* Панель счета */
        #score-board { font-size: 1.8em; margin-bottom: 20px; background: rgba(0,0,0,0.4); padding: 15px 30px; border-radius: 50px; border: 2px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        /* Сетка */
        .grid { display: grid; grid-template-columns: repeat(5, 100px); gap: 8px; margin-bottom: 30px; padding: 10px; background: #34495e; border-radius: 12px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        
        /* Клетка */
        .cell { 
            width: 100px; height: 100px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 1.1em; cursor: pointer; 
            border-radius: 8px; transition: all 0.2s ease; position: relative;
            user-select: none;
        }
        .cell:hover { transform: scale(1.05); z-index: 10; }
        .cell.selected { transform: scale(1.1); border: 3px solid yellow; box-shadow: 0 0 15px yellow; z-index: 20; }
        .cell.disabled { cursor: not-allowed; opacity: 0.7; filter: grayscale(100%); }

        /* Цвета уровней денег */
        .lvl-1 { background: #2ecc71; color: black; } /* 1 */
        .lvl-2 { background: #27ae60; color: white; } /* 2 */
        .lvl-3 { background: #f1c40f; color: black; } /* 5 */
        .lvl-4 { background: #f39c12; color: white; } /* 10 */
        .lvl-5 { background: #e67e22; color: white; } /* 100 */
        .lvl-6 { background: #c0392b; color: white; } /* 500 */
        .lvl-7 { background: #9b59b6; color: white; } /* 1000 */
        .lvl-8 { background: #34495e; color: gold; border: 2px solid gold; } /* 10к */
        .lvl-9 { background: linear-gradient(45deg, #7f8c8d, #95a5a6); color: silver; font-style: italic; } /* Чемодан */
        .lvl-10 { background: #bdc3c7; color: black; border: 2px solid #333; } /* Банк */
        .lvl-11 { background: #d35400; color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; } /* Президент */

        /* Отрицательные объекты */
        .thief { background: #2c3e50; color: red; border: 3px dashed red; font-size: 0.9em; text-align: center; padding: 5px; } 
        .debt { background: #555; color: yellow; border: 2px solid yellow; font-size: 0.8em; } 

        /* Нейтральные объекты */
        .safe { background: #1abc9c; color: white; border: 3px solid white; font-size: 0.9em; } 
        .empty { background: transparent; color: #555; border: 2px dashed #555; pointer-events: none; } 

        button { padding: 15px 40px; font-size: 1.2em; margin-top: 10px; cursor: pointer; background: white; color: #2c3e50; border: none; border-radius: 50px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-weight: bold; }
        button:hover { background: #f1c40f; transform: translateY(-2px); }
    </style>
</head>
<body>

    <h1>Денежное Слияние</h1>
    <div id="score-board">Баланс: <span id="score">0</span> ₽</div>
    
    <div class="grid" id="game-grid"></div>
    <button onclick="restartGame()">Начать заново</button>
    <p style="margin-top:10px; color:#aaa; font-size:0.9em;">Кликни на первую фишку, затем на соседнюю.</p>

    }
