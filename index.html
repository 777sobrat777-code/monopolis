<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Р”РµРЅРµР¶РЅРѕРµ РЎР»РёСЏРЅРёРµ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; 
            padding: 15px; user-select: none; -webkit-user-select: none;
            touch-action: none;
        }
        h1 { font-size: 1.6em; margin: 10px 0; color: #f1c40f; text-shadow: 0 0 10px rgba(241,196,15,0.3); letter-spacing: 1px; }
        .score-wrap { 
            font-size: 1.3em; margin-bottom: 15px; 
            background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 20px;
        }
        #score { font-weight: bold; color: #2ecc71; }
        .grid { 
            display: grid; grid-template-columns: repeat(5, 70px); grid-template-rows: repeat(5, 70px);
            gap: 4px; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 12px;
            margin-bottom: 20px;
        }
        .cell { 
            width: 70px; height: 70px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 0.85em; text-align: center;
            border-radius: 8px; cursor: grab; 
            transition: transform 0.15s, opacity 0.2s;
            position: relative;
        }
        .cell:active { cursor: grabbing; }
        .cell.dragging-source { opacity: 0.35; transform: scale(0.85); z-index: 0; }
        .cell.possible-target { outline: 3px solid #f1c40f; outline-offset: 2px; transform: scale(1.08); z-index: 2; }

        .lvl-1  { background: #27ae60; color: #fff; }  /* 10 в‚Ѕ */
        .lvl-2  { background: #2ecc71; color: #000; }  /* 50 в‚Ѕ */
        .lvl-3  { background: #f1c40f; color: #000; }  /* 100 в‚Ѕ */
        .lvl-4  { background: #f39c12; color: #fff; }  /* 200 в‚Ѕ */
        .lvl-5  { background: #e67e22; color: #fff; }  /* 500 в‚Ѕ */
        .lvl-6  { background: #e74c3c; color: #fff; }  /* 1000 в‚Ѕ */
        .lvl-7  { background: #8e44ad; color: #fff; }  /* 5000 в‚Ѕ */
        .lvl-8  { background: #2c3e50; color: #f1c40f; border: 2px solid #f1c40f; }  /* 10 000 в‚Ѕ */
        .lvl-9  { background: linear-gradient(135deg, #7f8c8d, #bdc3c7); color: #000; }  /* 50 000 в‚Ѕ */
        .lvl-10 { background: linear-gradient(135deg, #34495e, #2c3e50); color: #ecf0f1; border: 2px solid #ecf0f1; }  /* 100 000 в‚Ѕ */
        .lvl-11 { background: linear-gradient(135deg, #f1c40f, #e67e22); color: #000; font-size: 0.95em; font-weight: 900; text-transform: uppercase; animation: pulse 1s infinite; }  /* 500 000 в‚Ѕ WIN */

        @keyframes pulse { 0%,100% { box-shadow: 0 0 10px #f1c40f; } 50% { box-shadow: 0 0 25px #f39c12, 0 0 40px #f1c40f; } }

        .empty { background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.15); cursor: default; pointer-events: auto; }

        button { 
            padding: 14px 35px; font-size: 1.1em; 
            background: #f1c40f; color: #1a1a2e; 
            border: none; border-radius: 30px; cursor: pointer; font-weight: bold; 
            transition: all 0.2s;
        }
        button:active { transform: scale(0.95); background: #e67e22; }

        .msg { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-120%); 
            background: rgba(0,0,0,0.85); color: #fff; padding: 12px 25px; 
            border-radius: 25px; font-weight: bold; z-index: 100; 
            transition: transform 0.3s ease; pointer-events: none;
        }
        .msg.show { transform: translateX(-50%) translateY(0); }
        .msg.win { background: #f1c40f; color: #000; font-size: 1.2em; }

        .drag-ghost { 
            position: fixed; pointer-events: none; z-index: 999; 
            width: 70px; height: 70px; border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 0.85em; opacity: 0.9; 
            transform: translate(-50%, -50%); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <h1>рџ’ё Р”РµРЅРµР¶РЅРѕРµ РЎР»РёСЏРЅРёРµ</h1>
    <div class="msg" id="msg"></div>
    <div class="score-wrap">Р‘Р°Р»Р°РЅСЃ: <span id="score">0</span> в‚Ѕ</div>
    
    <div class="grid" id="game-grid"></div>
    <button onclick="Game.restart()">рџ”„ РќР°С‡Р°С‚СЊ Р·Р°РЅРѕРІРѕ</button>

<script>
const Game = (function() {
    const SIZE = 5;
    const MAX_LVL = 11;
    const NAMES  = ['','10в‚Ѕ','50в‚Ѕ','100в‚Ѕ','200в‚Ѕ','500в‚Ѕ','1000в‚Ѕ','5000в‚Ѕ','10 000в‚Ѕ','50 000в‚Ѕ','100 000в‚Ѕ','500 000в‚Ѕ'];
    const VALUES = [0,10,50,100,200,500,1000,5000,10000,50000,100000,500000];

    let grid = [];
    let score = 0;
    let won = false;
    const gridEl = document.getElementById('game-grid');
    const scoreEl = document.getElementById('score');
    const msgEl = document.getElementById('msg');

    let dragLvl = 0;
    let dragRow = -1, dragCol = -1;
    let ghostEl = null;

    function init() {
        grid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
        score = 0;
        won = false;
        // Fill ~60% cells with levels 1-3
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                if (Math.random() < 0.6) {
                    grid[r][c] = Math.floor(Math.random() * 3) + 1;
                }
            }
        }
        updateScore();
        render();
    }

    function updateScore() {
        score = 0;
        for (let r = 0; r < SIZE; r++)
            for (let c = 0; c < SIZE; c++)
                score += VALUES[grid[r][c]];
        scoreEl.textContent = score.toLocaleString('ru-RU');
    }

    function render() {
        gridEl.innerHTML = '';
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const lvl = grid[r][c];
                if (lvl > 0) {
                    cell.classList.add('lvl-' + lvl);
                    cell.textContent = NAMES[lvl];
                    cell.dataset.lvl = lvl;
                } else {
                    cell.classList.add('empty');
                }
                cell.dataset.row = r;
                cell.dataset.col = c;
                cell.addEventListener('pointerdown', onPointerDown);
                gridEl.appendChild(cell);
            }
        }
    }

    function onPointerDown(e) {
        if (won) return;
        const cell = e.currentTarget;
        const lvl = parseInt(cell.dataset.lvl) || 0;
        if (lvl === 0) return;

        dragLvl = lvl;
        dragRow = parseInt(cell.dataset.row);
        dragCol = parseInt(cell.dataset.col);

        // Mark source
        cell.classList.add('dragging-source');

        // Create ghost
        ghostEl = document.createElement('div');
        ghostEl.className = 'drag-ghost lvl-' + lvl;
        ghostEl.textContent = NAMES[lvl];
        ghostEl.style.left = e.clientX + 'px';
        ghostEl.style.top = e.clientY + 'px';
        document.body.appendChild(ghostEl);

        // Highlight valid targets
        const allCells = gridEl.querySelectorAll('.cell');
        allCells.forEach(c => {
            const r = parseInt(c.dataset.row);
            const col = parseInt(c.dataset.col);
            if (r === dragRow && col === dragCol) return;
            if (grid[r][col] === 0 || grid[r][col] === lvl) {
                c.classList.add('possible-target');
            }
        });

        document.addEventListener('pointermove', onPointerMove);
        document.addEventListener('pointerup', onPointerUp);
        document.addEventListener('pointercancel', onPointerUp);
        e.preventDefault();
    }

    function onPointerMove(e) {
        if (!ghostEl) return;
        ghostEl.style.left = e.clientX + 'px';
        ghostEl.style.top = e.clientY + 'px';

        // Check which cell we're over
        const elem = document.elementFromPoint(e.clientX, e.clientY);
        if (elem && elem.classList.contains('possible-target')) {
            elem.style.outline = '3px solid #2ecc71';
        }
        // Reset others
        document.querySelectorAll('.possible-target').forEach(el => {
            if (el !== elem) el.style.outline = '';
        });
    }

    function onPointerUp(e) {
        document.removeEventListener('pointermove', onPointerMove);
        document.removeEventListener('pointerup', onPointerUp);
        document.removeEventListener('pointercancel', onPointerUp);

        if (ghostEl) { ghostEl.remove(); ghostEl = null; }

        // Get target cell
        let targetCell = null;
        if (e.type !== 'pointercancel') {
            const elem = document.elementFromPoint(e.clientX, e.clientY);
            if (elem && elem.classList.contains('possible-target')) {
                targetCell = elem;
            }
        }

        // Cleanup highlights
        document.querySelectorAll('.possible-target').forEach(el => el.style.outline = '');
        document.querySelectorAll('.dragging-source').forEach(el => el.classList.remove('dragging-source'));
        document.querySelectorAll('.possible-target').forEach(el => el.classList.remove('possible-target'));

        if (!targetCell) { dragLvl = 0; dragRow = dragCol = -1; return; }

        const tr = parseInt(targetCell.dataset.row);
        const tc = parseInt(targetCell.dataset.col);
        const targetLvl = grid[tr][tc];

        if (targetLvl === dragLvl && dragLvl < MAX_LVL) {
            // MERGE!
            grid[tr][tc] = dragLvl + 1;
            grid[dragRow][dragCol] = 0;
            updateScore();
            render();
            showMsg('+' + NAMES[dragLvl + 1] + '!', 'success');

            if (dragLvl + 1 === MAX_LVL) {
                won = true;
                setTimeout(() => showMsg('рџЏ† РџРћР‘Р•Р”Рђ! 500 000 в‚Ѕ! рџЏ†', 'win'), 300);
            }

            // Spawn new random item if grid not full
            spawnRandom();
        } else if (targetLvl === 0) {
            // Move to empty
            grid[tr][tc] = dragLvl;
            grid[dragRow][dragCol] = 0;
            render();
            spawnRandom();
        } else {
            // Invalid target
            showMsg('РњРѕР¶РЅРѕ С‚РѕР»СЊРєРѕ РЅР° С‚Р°РєРѕР№ Р¶Рµ РёР»Рё РїСѓСЃС‚СѓСЋ!', 'error');
            render();
        }

        dragLvl = 0;
        dragRow = dragCol = -1;
    }

    function spawnRandom() {
        const empties = [];
        for (let r = 0; r < SIZE; r++)
            for (let c = 0; c < SIZE; c++)
                if (grid[r][c] === 0) empties.push([r, c]);

        if (empties.length === 0) {
            showMsg('РќРµС‚ РјРµСЃС‚Р°! РЎР»РёРІР°Р№ РѕРґРёРЅР°РєРѕРІС‹Рµ.', 'error');
            return;
        }

        const [r, c] = empties[Math.floor(Math.random() * empties.length)];
        // Spawn level 1 (70%) or 2 (30%)
        grid[r][c] = Math.random() < 0.7 ? 1 : 2;
        updateScore();
        render();
    }

    function showMsg(text, type) {
        msgEl.textContent = text;
        msgEl.className = 'msg ' + (type || '');
        msgEl.classList.add('show');
        clearTimeout(msgEl._timeout);
        msgEl._timeout = setTimeout(() => msgEl.classList.remove('show'), 1500);
    }

    function restart() {
        init();
        showMsg('РќРѕРІР°СЏ РёРіСЂР°!', 'success');
    }

    // Init on load
    init();

    // Prevent scroll on drag
    document.addEventListener('touchmove', function(e) {
        if (e.target.closest('.cell') && e.target.closest('.cell').classList.contains('dragging-source')) {
            e.preventDefault();
        }
    }, { passive: false });

    return { restart };
})();
</script>
</body>
</html>
