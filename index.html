            position: fixed;

        /* Цвета объектов */

        .t-gbars { background: linear-gradient(135deg, #ffd700, #f1c40f, #ffaa00, #ffd700); color: #2c1a00; font-size: 0.65em; font-weight: 900; border: 2px solid #fff; box-shadow: 0 0 14px rgba(255,215,0,0.8); }
        .t-merc  { background: #111; color: #ccc; font-size: 0.7em; border: 2px solid #555; text-shadow: 0 0 6px rgba(255,255,255,0.3); }
        .t-bank  { background: linear-gradient(180deg, #1a237e, #283593, #1a237e); color: #ffd700; font-size: 0.85em; border: 2px solid #ffd700; font-weight: 900; letter-spacing: 1px; text-shadow: 0 0 6px rgba(255,215,0,0.4); }
        .t-magn  { background: linear-gradient(135deg, #e74c3c, #f1c40f, #2ecc71, #3498db, #9b59b6); color: #fff; font-size: 0.85em; font-weight: 900; border: 3px solid #fff; box-shadow: 0 0 20px rgba(255,255,255,0.5); animation: magn-glow 1.5s ease-in-out infinite alternate; text-shadow: 0 0 8px rgba(0,0,0,0.5); }
        @keyframes magn-glow {
            0% { box-shadow: 0 0 12px rgba(241,196,15,0.6); }
            100% { box-shadow: 0 0 24px rgba(255,255,255,0.9); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex;gap:8px;">
            <div class="score-box">
                <div class="score-label">Счёт</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="best-box">
                <div class="best-label">Рекорд</div>
                <div class="best-value" id="best">0</div>
            </div>
        </div>
        <button class="btn-small" onclick="Game.restart()">Заново</button>
    </div>

    <div class="game-container" id="gameContainer">
        <div class="grid-bg" id="gridBg"></div>
        <div class="tiles-layer" id="tilesLayer"></div>
    </div>

    <div class="controls">
        <span style="color:#aaa;font-size:0.75em;">←↑↓→ свайпами или стрелками</span>
    </div>

    <!-- Оверлей победы -->
    <div class="msg-overlay hidden" id="winOverlay">
        <div class="msg-text">🏆 МАГНАТ!</div>
        <div class="msg-sub">Ты собрал империю. Счёт: <span id="winScore">0</span></div>
        <button onclick="Game.restart()">Играть ещё</button>
    </div>

    <!-- Оверлей поражения -->
    <div class="msg-overlay hidden" id="loseOverlay">
        <div class="msg-text">😵 Ходов нет</div>
        <div class="msg-sub">Поле забито. Счёт: <span id="loseScore">0</span></div>
        <button onclick="Game.restart()">Попробовать снова</button>
    </div>

<script>
(function() {
    const SIZE = 6;
    const GAP = 6;
    const PAD = 8;

    // Иерархия: уровень → {название, css-класс, очки за слияние}
    const LEVELS = [
        { id: 0,  name: '1₽',        cls: 't-1',     pts: 1,     spawn: true,  weight: 40 },
        { id: 1,  name: '2₽',        cls: 't-2',     pts: 2,     spawn: true,  weight: 30 },
        { id: 2,  name: '5₽',        cls: 't-5',     pts: 5,     spawn: true,  weight: 18 },
        { id: 3,  name: '10₽',       cls: 't-10',    pts: 10,    spawn: true,  weight: 10 },
        { id: 4,  name: '100₽',      cls: 't-100',   pts: 100,   spawn: true,  weight: 2 },
        { id: 5,  name: '500₽',      cls: 't-500',   pts: 500,   spawn: false, weight: 0 },
        { id: 6,  name: '1 000₽',    cls: 't-1000',  pts: 1000,  spawn: false, weight: 0 },
        { id: 7,  name: '2 000₽',    cls: 't-2000',  pts: 2000,  spawn: false, weight: 0 },
        { id: 8,  name: '5 000₽',    cls: 't-5000',  pts: 5000,  spawn: false, weight: 0 },
        { id: 9,  name: '10 000₽',   cls: 't-10000', pts: 10000, spawn: false, weight: 0 },
        { id: 10, name: 'Чемодан',   cls: 't-bcase', pts: 15000, spawn: false, weight: 0 },
        { id: 11, name: 'Зол. чемодан', cls: 't-gcase', pts: 25000, spawn: false, weight: 0 },
        { id: 12, name: 'Слиток',    cls: 't-gbar',  pts: 50000, spawn: false, weight: 0 },
        { id: 13, name: 'Слитки',    cls: 't-gbars', pts: 100000, spawn: false, weight: 0 },
        { id: 14, name: 'Мерседес',  cls: 't-merc',  pts: 250000, spawn: false, weight: 0 },
        { id: 15, name: 'Банк',      cls: 't-bank',  pts: 500000, spawn: false, weight: 0 },
        { id: 16, name: 'Магнат',    cls: 't-magn',  pts: 1000000, spawn: false, weight: 0 }
    ];
    const MAX_LEVEL = LEVELS.length - 1; // 16 = Магнат
    const WIN_LEVEL = MAX_LEVEL;

    let grid = [];       // grid[row][col] = level id или null
    let score = 0;
    let best = 0;
    let won = false;
    let gameOver = false;
    let tileSize = 0;

    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const gridBg = document.getElementById('gridBg');
    const tilesLayer = document.getElementById('tilesLayer');
    const gameContainer = document.getElementById('gameContainer');
    const winOverlay = document.getElementById('winOverlay');
    const loseOverlay = document.getElementById('loseOverlay');

    // Локальное хранилище рекорда
    try { best = parseInt(localStorage.getItem('merge2048_best')) || 0; } catch(e) {}
    bestEl.textContent = best;

    function calcTileSize() {
        const w = gameContainer.clientWidth;
        tileSize = Math.floor((w - PAD * 2 - GAP * (SIZE + 1)) / SIZE);
    }

    function buildBg() {
        gridBg.innerHTML = '';
        for (let i = 0; i < SIZE * SIZE; i++) {
            const div = document.createElement('div');
            div.className = 'cell-bg';
            gridBg.appendChild(div);
        }
    }

    function tilePos(row, col) {
        return {
            left: PAD + col * (tileSize + GAP) + GAP,
            top: PAD + row * (tileSize + GAP) + GAP
        };
    }

    function render() {
        tilesLayer.innerHTML = '';
        const frag = document.createDocumentFragment();
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                const lvl = grid[r][c];
                if (lvl === null) continue;
                const info = LEVELS[lvl];
                const pos = tilePos(r, c);
                const div = document.createElement('div');
                div.className = 'tile ' + info.cls;
                div.textContent = info.name;
                div.style.left = pos.left + 'px';
                div.style.top = pos.top + 'px';
                div.style.width = tileSize + 'px';
                div.style.height = tileSize + 'px';
                div.style.fontSize = (tileSize * 0.22) + 'px';
                div.dataset.row = r;
                div.dataset.col = c;
                div.dataset.lvl = lvl;
                div.dataset.merged = '0';
                div.dataset.isNew = '0';
                frag.appendChild(div);
            }
        }
        tilesLayer.appendChild(frag);
    }

    function renderTileAnimated(r, c, merged, isNew) {
        const lvl = grid[r][c];
        if (lvl === null) return;
        const info = LEVELS[lvl];
        const pos = tilePos(r, c);
        const div = document.createElement('div');
        div.className = 'tile ' + info.cls + (merged ? ' merged' : '') + (isNew ? ' new' : '');
        div.textContent = info.name;
        div.style.left = pos.left + 'px';
        div.style.top = pos.top + 'px';
        div.style.width = tileSize + 'px';
        div.style.height = tileSize + 'px';
        div.style.fontSize = (tileSize * 0.22) + 'px';
        tilesLayer.appendChild(div);
    }

    function renderFull(mergeMap, newMap) {
        tilesLayer.innerHTML = '';
        const frag = document.createDocumentFragment();
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                const lvl = grid[r][c];
                if (lvl === null) continue;
                const info = LEVELS[lvl];
                const pos = tilePos(r, c);
                const merged = mergeMap && mergeMap[r] && mergeMap[r][c];
                const isNew = newMap && newMap[r] && newMap[r][c];
                const div = document.createElement('div');
                div.className = 'tile ' + info.cls + (merged ? ' merged' : '') + (isNew ? ' new' : '');
                div.textContent = info.name;
                div.style.left = pos.left + 'px';
                div.style.top = pos.top + 'px';
                div.style.width = tileSize + 'px';
                div.style.height = tileSize + 'px';
                div.style.fontSize = (tileSize * 0.22) + 'px';
                frag.appendChild(div);
            }
        }
        tilesLayer.appendChild(frag);
    }

    function emptyCells() {
        const cells = [];
        for (let r = 0; r < SIZE; r++)
            for (let c = 0; c < SIZE; c++)
                if (grid[r][c] === null) cells.push({r, c});
        return cells;
    }

    function spawnTile() {
        const empty = emptyCells();
        if (empty.length === 0) return false;
        const pos = empty[Math.floor(Math.random() * empty.length)];

        // Выбор уровня для спавна: только spawn:true, с весами
        const spawnable = LEVELS.filter(l => l.spawn);
        const totalWeight = spawnable.reduce((s, l) => s + l.weight, 0);
        let roll = Math.random() * totalWeight;
        let chosen = spawnable[0];
        for (const l of spawnable) {
            roll -= l.weight;
            if (roll <= 0) { chosen = l; break; }
        }
        grid[pos.r][pos.c] = chosen.id;
        return { r: pos.r, c: pos.c, lvl: chosen.id };
    }

    function initGrid() {
        grid = Array.from({length: SIZE}, () => Array(SIZE).fill(null));
        score = 0;
        won = false;
        gameOver = false;
        winOverlay.classList.add('hidden');
        loseOverlay.classList.add('hidden');
        scoreEl.textContent = '0';
        spawnTile();
        spawnTile();
        render();
    }

    function canMove() {
        // Есть ли пустые клетки или соседние одинаковые
        if (emptyCells().length > 0) return true;
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                if (c < SIZE - 1 && grid[r][c] === grid[r][c+1]) return true;
                if (r < SIZE - 1 && grid[r][c] === grid[r+1][c]) return true;
            }
        }
        return false;
    }

    function move(dir) {
        // dir: 0=up, 1=right, 2=down, 3=left
        if (gameOver || won) return false;

        const vectors = [
            {dr: -1, dc: 0},  // up
            {dr: 0, dc: 1},   // right
            {dr: 1, dc: 0},   // down
            {dr: 0, dc: -1}   // left
        ];
        const v = vectors[dir];

        // Порядок обхода: сдвигаем в направлении движения
        const rows = [];
        const cols = [];
        if (v.dr === 1)  for (let r = SIZE-1; r >= 0; r--) rows.push(r); // down: снизу вверх
        else             for (let r = 0; r < SIZE; r++) rows.push(r);
        if (v.dc === 1)  for (let c = SIZE-1; c >= 0; c--) cols.push(c); // right: справа налево
        else             for (let c = 0; c < SIZE; c++) cols.push(c);

        const merged = Array.from({length: SIZE}, () => Array(SIZE).fill(false));
        let moved = false;

        for (const r of rows) {
            for (const c of cols) {
                if (grid[r][c] === null) continue;
                let cr = r, cc = c;
                // Двигаем пока можем
                while (true) {
                    const nr = cr + v.dr;
                    const nc = cc + v.dc;
                    if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) break; // граница
                    if (grid[nr][nc] === null) {
                        // Пусто — двигаем
                        grid[nr][nc] = grid[cr][cc];
                        grid[cr][cc] = null;
                        cr = nr; cc = nc;
                        moved = true;
                    } else if (grid[nr][nc] === grid[cr][cc] && !merged[nr][nc]) {
                        // Слияние
                        const oldLvl = grid[cr][cc];
                        const newLvl = oldLvl + 1;
                        grid[nr][nc] = newLvl;
                        grid[cr][cc] = null;
                        merged[nr][nc] = true;
                        score += LEVELS[newLvl].pts;
                        moved = true;
                        if (newLvl >= WIN_LEVEL) won = true;
                        break;
                    } else {
                        break; // упёрлись в другой тайл
                    }
                }
            }
        }

        if (moved) {
            const newTile = spawnTile();
            const newMap = Array.from({length: SIZE}, () => Array(SIZE).fill(false));
            if (newTile) newMap[newTile.r][newTile.c] = true;
            renderFull(merged, newMap);
            scoreEl.textContent = score;

            if (!canMove()) {
                gameOver = true;
                setTimeout(() => {
                    document.getElementById('loseScore').textContent = score;
                    loseOverlay.classList.remove('hidden');
                }, 400);
            }
            if (won && !gameOver) {
                setTimeout(() => {
                    document.getElementById('winScore').textContent = score;
                    winOverlay.classList.remove('hidden');
                }, 500);
            }
            // Сохраняем рекорд
            if (score > best) {
                best = score;
                bestEl.textContent = best;
                try { localStorage.setItem('merge2048_best', best); } catch(e) {}
            }
            return true;
        }
        return false;
    }

    // --- Управление ---
    let touchStartX = 0, touchStartY = 0;

    gameContainer.addEventListener('touchstart', e => {
        if (e.touches.length === 1) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }
    }, {passive: false});

    gameContainer.addEventListener('touchend', e => {
        if (gameOver || won) return;
        const dx = (e.changedTouches[0]?.clientX || touchStartX) - touchStartX;
        const dy = (e.changedTouches[0]?.clientY || touchStartY) - touchStartY;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);
        if (Math.max(absDx, absDy) < 20) return; // слишком короткий свайп

        if (absDx > absDy) {
            move(dx > 0 ? 1 : 3); // right : left
        } else {
            move(dy > 0 ? 2 : 0); // down : up
        }
    });

    document.addEventListener('keydown', e => {
        const map = { ArrowUp: 0, ArrowRight: 1, ArrowDown: 2, ArrowLeft: 3 };
        if (e.key in map) {
            e.preventDefault();
            move(map[e.key]);
        }
    });

    // --- Публичный API ---
    window.Game = {
        restart() {
            calcTileSize();
            initGrid();
        },
        move
    };

    // Старт
    buildBg();
    calcTileSize();
    initGrid();

    window.addEventListener('resize', () => {
        calcTileSize();
        render();
    });
})();
</script>
</body>
</html>
