<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Денежное Слияние</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; height: 100vh; overflow: hidden; user-select: none; }
        h1 { margin-bottom: 10px; }
        #score { font-size: 1.5em; font-weight: bold; color: #f1c40f; }
        .grid { display: grid; grid-template-columns: repeat(5, 90px); gap: 5px; margin-bottom: 20px; padding: 10px; background: #34495e; border-radius: 8px; }
        
        .cell { 
            width: 90px; height: 90px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 1.1em; 
            border-radius: 6px; cursor: grab; 
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .cell:active { cursor: grabbing; }

        /* Состояния перетаскивания */
        .dragging-source { opacity: 0.5; transform: scale(0.9); pointer-events: none; z-index: 0; }
        .possible-target { border: 3px solid #f1c40f; transform: scale(1.05); z-index: 2; }

        /* Цвета денег */
        .lvl-1 { background: #2ecc71; color: black; }
        .lvl-2 { background: #27ae60; color: white; }
        .lvl-3 { background: #f1c40f; color: black; }
        .lvl-4 { background: #f39c12; color: white; }
        .lvl-5 { background: #e67e22; color: white; }
        .lvl-6 { background: #c0392b; color: white; }
        .lvl-7 { background: #9b59b6; color: white; }
        .lvl-8 { background: #34495e; color: gold; border: 2px solid gold; }
        .lvl-9 { background: linear-gradient(45deg, #7f8c8d, #95a5a6); color: silver; }
        .lvl-10 { background: #bdc3c7; color: black; border: 1px solid #555; }
        .lvl-11 { background: #d35400; color: white; font-weight: 900; text-transform: uppercase; }

        /* Спец объекты */
        .thief { background: #2c3e50; color: red; border: 2px dashed red; font-size: 0.8em; text-align: center; padding: 4px; }
        .debt { background: #555; color: yellow; border: 2px solid yellow; font-size: 0.8em; }
        .safe { background: #1abc9c; color: white; border: 2px solid white; font-size: 0.8em; }
        .empty { background: transparent; color: #666; border: 1px dashed #666; pointer-events: none; }

        button { padding: 15px 30px; font-size: 1.2em; background: white; color: #2c3e50; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #f1c40f; }

        #msg { position: absolute; top: 80px; left: 50%; transform: translateX(-50%) translateY(-100%); background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 20px; z-index: 10; transition: transform 0.3s; }
        #msg.show { transform: translateX(-50%) translateY(0); }
        #msg.success { color: #2ecc71; }
        #msg.error { color: #e74c3c; }
    </style>
</head>
<body>

    <h1>Денежное Слияние</h1>
    <div id="msg"></div>
    <div>Баланс: <span id="score">0</span> ₽</div>
    
    <div class="grid" id="game-grid"></div>
    <button onclick="Game.restart()">Начать заново</button>

<script>
    const Game = (function() {
        const SIZE = 5;
        let grid = [];
        let score = 0;
        const scoreEl = document.getElementById('score');
        const msgEl = document.getElementById('msg');

        // Данные уровней
        const MONEY = [
            {v:1, n:"1₽", c:"lvl-1"}, {v:2, n:"2₽", c:"lvl-2"}, {v:5, n:"5₽", c:"lvl-3"},
            {v:10, n:"10₽", c:"lvl-4"}, {v:100, n:"100₽", c:"lvl-5"}, {v:500, n:"500₽", c:"lvl-6"},
            {v:1000, n:"1к₽", c:"lvl-7"}, {v:10000, n:"10к₽", c:"lvl-8"}, 
            {v:0, n:"Чемодан", c:"lvl-9"}, {v:0, n:"Банк", c:"lvl-10"}, {v:999999, n:"През.", c:"lvl-11"}
        ];
        const BAD = [{t:"thief", n:"Вор", c:"thief"}, {t:"debt", n:"Долг", c:"debt"}];
        const NEUT = [{t:"safe", n:"Копилка", c:"safe"}, {t:"empty", n:"", c:"empty"}];

        let dragIdx = -1;

        function init() {
            grid = [];
            score = 0;
            updateScore();
            for(let i=0; i<SIZE*SIZE; i++) grid.push(randomCell());
            render();
        }

        function randomCell() {
            let r = Math.random();
            if(r < 0.75) {
                let lvl = Math.floor(Math.random() * 6);
                return {...MONEY[lvl], type: 'money', lvl: lvl};
            } else if(r < 0.88) {
                let b = BAD[Math.floor(Math.random()*BAD.length)];
                return {...b, type: 'bad', lvl: -1};
            } else {
                let n = NEUT[Math.floor(Math.random()*NEUT.length)];
                return {...n, type: 'neutral', lvl: -2};
            }
        }

        function render() {
            const container = document.getElementById('game-grid');
            container.innerHTML = '';
            grid.forEach((data, i) => {
                const div = document.createElement('div');
                div.className = `cell ${data.c}`;
                if(data.type === 'empty') div.innerHTML = '&nbsp;';
                else div.innerText = data.n;
                
                div.addEventListener('mousedown', e => startDrag(i, e));
                div.addEventListener('touchstart', e => { e.preventDefault(); startDrag(i, e); });
                container.appendChild(div);
            });
        }

        function updateScore() { scoreEl.innerText = score; }
        function showMsg(text, type='normal') {
            msgEl.innerText = text;
            msgEl.className = 'show';
            if(type==='success') msgEl.classList.add('success');
            else if(type==='error') msgEl.classList.add('error');
            setTimeout(()=>msgEl.className='', 2500);
        }

        // --- Drag Logic ---
        function startDrag(idx, e) {
            if(grid[idx].type === 'empty' || dragIdx !== -1) return;
            dragIdx = idx;
            const cells = document.querySelectorAll('.cell');
            cells[idx].classList.add('dragging-source');
            highlightNeighbors(idx);
        }

        function highlightNeighbors(start) {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((c, idx) => {
                if(idx !== start && grid[idx].type !== 'empty' && isNeighbor(start, idx)) {
                    c.classList.add('possible-target');
                } else {
                    c.classList.remove('possible-target');
                }
            });
        }

        function isNeighbor(a, b) {
            const r1 = Math.floor(a/SIZE), c1 = a%SIZE;
            const r2 = Math.floor(b/SIZE), c2 = b%SIZE;
            return (Math.abs(r1-r2) === 1 && c1===c2) || (r1===r2 && Math.abs(c1-c2)===1);
        }

        document.addEventListener('mousemove', handleMove);
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e); }, {passive: false});
        document.addEventListener('touchend', endDrag);

        function handleMove(e) {
            if(dragIdx === -1) return;
            const mx = e.clientX || e.touches[0].clientX;
            const my = e.clientY || e.touches[0].clientY;
            
            const cells = document.querySelectorAll('.cell:not(.dragging-source)');
            let found = false;
            cells.forEach(c => {
                const r = c.getBoundingClientRect();
                if(mx >= r.left && mx <= r.right && my >= r.top && my <= r.bottom) {
                    const tIdx = Array.from(document.querySelectorAll('.cell')).indexOf(c);
                    if(isNeighbor(dragIdx, tIdx)) {
                        c.classList.add('possible-target');
                        found = true;
                    }
                } else {
                    c.classList.remove('possible-target');
                }
            });
            if(!found) cells.forEach(c => c.classList.remove('possible-target'));
        }

        function endDrag(e) {
            if(dragIdx === -1) return;
            
            // Определяем цель по координатам мыши/пальца
            const mx = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const my = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            let targetIdx = -1;
            const allCells = Array.from(document.querySelectorAll('.cell'));
            allCells.forEach((c, i) => {
                const r = c.getBoundingClientRect();
                if(mx >= r.left && mx <= r.right && my >= r.top && my <= r.bottom) {
                    targetIdx = i;
                }
            });

            // Проверка: сосед ли это?
            if(targetIdx === -1 || !isNeighbor(dragIdx, targetIdx)) {
                resetDrag();
                return;
            }

            const src = grid[dragIdx];
            const dst = grid[targetIdx];
            let valid = true;
            let msg = "";
            let mType = "normal";

            if(src.type === 'money' && dst.type === 'money') {
                if(src.lvl === dst.lvl) {
                    let nextLvl = src.lvl + 1;
                    if(nextLvl >= MONEY.length) nextLvl = MONEY.length - 1;
                    
                    grid[targetIdx] = {...MONEY[nextLvl], type:'money', lvl:nextLvl};
                    score += MONEY[nextLvl].v;
                    grid[dragIdx] = {...NEUT[1], type:'neutral', lvl:-2}; // Пустая
                    msg = `Слияние! Получено ${grid[targetIdx].n}`;
                    mType = 'success';
                } else {
                    valid = false;
                    msg = "Можно сливать только одинаковые!";
                    mType = 'error';
                }
            } 
            else if (src.type === 'bad' && src.t === 'thief') {
                // Вор крадет у денег
                if(dst.type === 'money') {
                    score -= dst.v;
                    grid[targetIdx] = {...NEUT[1], type:'neutral', lvl:-2};
                    grid[dragIdx] = randomCell(); // Вор исчезает
                    msg = "Вор украл деньги!";
                    mType = 'error';
                } else valid = false;
            }
            else {
                // Простое перемещение (обмен местами или сброс на пустую)
                if(dst.type !== 'empty') {
                    [grid[dragIdx], grid[targetIdx]] = [grid[targetIdx], grid[dragIdx]];
                } else {
                    grid[targetIdx] = src;
                    grid[dragIdx] = {...NEUT[1], type:'neutral', lvl:-2};
                }
                msg = "Ход сделан";
            }

            resetDrag();
            updateScore();
            render();
            
            if(!valid) showMsg(msg, 'error');
            else showMsg(msg, mType);
        }

        function resetDrag() {
            dragIdx = -1;
            document.querySelectorAll('.cell').forEach(c => {
                c.classList.remove('dragging-source', 'possible-target');
            });
        }

        return { restart: init };
    })();

    // Старт при загрузке
    document.addEventListener('DOMContentLoaded', () => Game.restart());
</script>
</body>
</html>
