<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>РңР°Р¶РҫСҖ 2048</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
#game { position: relative; width: 360px; }
#header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
h1 { color: #d4af37; font-size: 28px; letter-spacing: 2px; text-shadow: 0 0 20px rgba(212,175,55,0.5); }
#scores { display: flex; gap: 8px; }
.score-box { background: #1a1a1a; border: 1px solid #d4af37; border-radius: 8px; padding: 6px 14px; text-align: center; }
.score-label { color: #888; font-size: 9px; text-transform: uppercase; }
.score-value { color: #d4af37; font-size: 18px; font-weight: bold; }
#board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; background: #141414; border: 2px solid #d4af37; border-radius: 12px; padding: 8px; box-shadow: 0 0 30px rgba(212,175,55,0.15); }
.tile { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; color: #fff; transition: all 0.15s ease; position: relative; }
.tile.val-1 { background: #1a1a1a; color: #333; font-size: 10px; }
.tile.val-2 { background: #2d2416; color: #c9a84c; }
.tile.val-3 { background: #3d2e1a; color: #d4af37; }
.tile.val-4 { background: #4a3620; color: #d4af37; }
.tile.val-5 { background: #5a3e24; color: #e0c060; }
.tile.val-6 { background: #6b4a2a; color: #e8c860; }
.tile.val-7 { background: #7d5630; color: #ecd070; }
.tile.val-8 { background: #8f6236; color: #f0d878; }
.tile.val-9 { background: #a2703c; color: #f4e080; }
.tile.val-10 { background: #b57e44; color: #f8e888; }
.tile.val-11 { background: #c88c4c; color: #fcf090; }
.tile.val-12 { background: #db9a54; color: #fff8a0; }
.tile.val-13 { background: #eea85c; color: #fffbb0; }
.tile.val-14 { background: #d4af37; color: #0a0a0a; font-size: 22px; text-shadow: 0 0 10px rgba(0,0,0,0.3); }
#btn { margin-top: 12px; width: 100%; padding: 14px; background: linear-gradient(135deg, #1a1a1a, #2a2a2a); border: 1px solid #d4af37; border-radius: 10px; color: #d4af37; font-size: 16px; cursor: pointer; letter-spacing: 1px; }
#btn:active { background: #d4af37; color: #0a0a0a; }
#msg { text-align: center; color: #d4af37; font-size: 14px; margin-top: 8px; height: 20px; }
</style>
</head>
<body>
<div id="game">
  <div id="header">
    <h1>РңРҗР–РһР </h1>
    <div id="scores">
      <div class="score-box"><div class="score-label">РЎСҮС‘СӮ</div><div class="score-value" id="score">0</div></div>
      <div class="score-box"><div class="score-label">Р РөРәРҫСҖРҙ</div><div class="score-value" id="best">0</div></div>
    </div>
  </div>
  <div id="board"></div>
  <div id="msg"></div>
  <button id="btn" onclick="restart()">РқРһР’РҗРҜ РҳР“Р Рҗ</button>
</div>
<script>
const SIZE = 5;
const LEVELS = 14;
const LABELS = ['10вӮҪ','50вӮҪ','100вӮҪ','200вӮҪ','500вӮҪ','1000вӮҪ','2000вӮҪ','5000вӮҪ','10000вӮҪ','рҹ’ј','рҹҸҶ','рҹҡ—','рҹҸҰ','рҹ‘‘'];
const BIG_EMOJI = {9:'рҹ’ј',10:'рҹҸҶ',11:'рҹҡ—',12:'рҹҸҰ',13:'рҹ‘‘'};

let board = Array(SIZE).fill().map(()=>Array(SIZE).fill(0));
let score = 0;
let best = parseInt(localStorage.getItem('major2048best')) || 0;
document.getElementById('best').textContent = best;

function addTile() {
  let empty = [];
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(board[r][c]==0) empty.push([r,c]);
  if(empty.length == 0) return;
  let [r,c] = empty[Math.floor(Math.random()*empty.length)];
  board[r][c] = Math.random() < 0.9 ? 1 : 2;
}

function render() {
  let b = document.getElementById('board');
  b.innerHTML = '';
  for(let r=0;r<SIZE;r++) {
    for(let c=0;c<SIZE;c++) {
      let tile = document.createElement('div');
      tile.className = 'tile';
      let v = board[r][c];
      if(v > 0) {
        tile.classList.add('val-'+Math.min(v,14));
        if(v <= 9) tile.textContent = LABELS[v-1];
        else tile.textContent = BIG_EMOJI[v-1] || LABELS[v-1];
        if(v >= 14) tile.style.fontSize = '28px';
      }
      b.appendChild(tile);
    }
  }
  document.getElementById('score').textContent = score;
  if(score > best) { best = score; localStorage.setItem('major2048best', best); document.getElementById('best').textContent = best; }
}

function slide(row) {
  let arr = row.filter(x => x>0);
  for(let i=0; i<arr.length-1; i++) {
    if(arr[i] == arr[i+1]) { arr[i]++; score += Math.pow(2, arr[i]); arr.splice(i+1,1); }
  }
  while(arr.length < SIZE) arr.push(0);
  return arr;
}

function move(dir) {
  let moved = false;
  let old = board.map(r=>[...r]);
  if(dir == 'left') for(let r=0;r<SIZE;r++) board[r] = slide(board[r]);
  else if(dir == 'right') for(let r=0;r<SIZE;r++) board[r] = slide([...board[r]].reverse()).reverse();
  else if(dir == 'up') for(let c=0;c<SIZE;c++) { let col=board.map(r=>r[c]); col=slide(col); for(let r=0;r<SIZE;r++) board[r][c]=col[r]; }
  else if(dir == 'down') for(let c=0;c<SIZE;c++) { let col=board.map(r=>r[c]).reverse(); col=slide(col); col.reverse(); for(let r=0;r<SIZE;r++) board[r][c]=col[r]; }
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(board[r][c]!=old[r][c]) moved=true;
  if(moved) { addTile(); render(); checkGameOver(); }
}

function checkGameOver() {
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) {
    if(board[r][c]==0) return;
    if(c<SIZE-1 && board[r][c]==board[r][c+1]) return;
    if(r<SIZE-1 && board[r][c]==board[r+1][c]) return;
  }
  document.getElementById('msg').textContent = 'РҳРіСҖР° РҫРәРҫРҪСҮРөРҪР°!';
  playFail();
}

let touchStartX=0, touchStartY=0;
document.addEventListener('touchstart', e => { touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; });
document.addEventListener('touchend', e => {
  let dx = e.changedTouches[0].clientX - touchStartX;
  let dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  if(Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
});

document.addEventListener('keydown', e => {
  if(e.key=='ArrowLeft') move('left');
  else if(e.key=='ArrowRight') move('right');
  else if(e.key=='ArrowUp') move('up');
  else if(e.key=='ArrowDown') move('down');
});

let audioCtx = null;
function initAudio() {
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}
function playTone(freq, dur, type='sine', vol=0.08) {
  if(!audioCtx) return;
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime+dur);
}
function playMove() { playTone(600,0.1,'sine',0.06); playTone(800,0.08,'sine',0.04); }
function playMerge() { playTone(900,0.15,'triangle',0.1); playTone(1200,0.1,'triangle',0.07); }
function playFail() { playTone(200,0.3,'sawtooth',0.1); playTone(150,0.4,'sawtooth',0.08); }

const origSlide = slide;
slide = function(row) {
  let oldLen = row.filter(x=>x>0).length;
  let res = origSlide(row);
  let newLen = res.filter(x=>x>0).length;
  if(newLen < oldLen) playMerge(); else playMove();
  return res;
};

document.addEventListener('touchstart', initAudio, {once:true});
document.addEventListener('keydown', initAudio, {once:true});

function restart() {
  board = Array(SIZE).fill().map(()=>Array(SIZE).fill(0));
  score = 0;
  document.getElementById('msg').textContent = '';
  initAudio();
  addTile(); addTile();
  render();
}
restart();
</script>
</body>
</html>
