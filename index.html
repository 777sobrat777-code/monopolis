<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Мажор 2048</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: linear-gradient(135deg, #1a1a2e 0%, #0d0d1a 100%);
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif;
  touch-action: manipulation; user-select: none; -webkit-user-select: none;
  overflow: hidden;
}
.game-wrapper { position: relative; width: 100%; max-width: 420px; padding: 12px; }
.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; background: rgba(255,215,0,0.08);
  border-radius: 16px; border: 1px solid rgba(255,215,0,0.2);
  margin-bottom: 10px;
}
.title { font-size: 22px; font-weight: 700; color: #ffd700; letter-spacing: 1px; }
.score-box {
  display: flex; flex-direction: column; align-items: center;
  background: rgba(255,215,0,0.12); border-radius: 10px; padding: 6px 14px;
  border: 1px solid rgba(255,215,0,0.3);
}
.score-label { font-size: 10px; color: #bba14f; text-transform: uppercase; letter-spacing: 2px; }
.score-value { font-size: 22px; font-weight: 700; color: #ffd700; line-height: 1.1; }
.timer-box {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,215,0,0.12); border-radius: 10px; padding: 6px 12px;
  border: 1px solid rgba(255,215,0,0.3);
}
.timer-icon { font-size: 18px; }
.timer-value { font-size: 18px; font-weight: 700; color: #ffd700; font-variant-numeric: tabular-nums; }
.controls { display: flex; gap: 8px; margin-bottom: 10px; }
.btn {
  flex: 1; padding: 10px; border: none; border-radius: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
  letter-spacing: 1px;
}
.btn:active { transform: scale(0.94); }
.btn-gold { background: linear-gradient(135deg, #ffd700, #b8860b); color: #1a1a2e; }
.btn-outline {
  background: transparent; color: #bba14f;
  border: 1px solid rgba(255,215,0,0.3);
}
.board-wrapper {
  position: relative; width: 100%; aspect-ratio: 1;
  background: rgba(0,0,0,0.4); border-radius: 16px;
  border: 2px solid rgba(255,215,0,0.2);
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 0 80px rgba(255,215,0,0.03);
}
.grid-bg { position: absolute; inset: 0; }
.grid-cell {
  position: absolute;
  background: rgba(255,255,255,0.03);
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.04);
}
.tile {
  position: absolute; display: flex; align-items: center; justify-content: center;
  border-radius: 10px; font-weight: 700; z-index: 1;
  transition: transform 0.12s ease-out, left 0.12s ease-out, top 0.12s ease-out;
  pointer-events: none;
}
.tile.pop { animation: popIn 0.2s ease-out; }
.tile.merge { animation: mergePop 0.25s ease-out; }
@keyframes popIn { 0% { transform: scale(0); } 60% { transform: scale(1.15); } 100% { transform: scale(1); } }
@keyframes mergePop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

/* OVERLAY — ввод ника */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display: flex; justify-content: center; align-items: center;
  z-index: 100; backdrop-filter: blur(6px);
}
.overlay-card {
  background: linear-gradient(145deg, #1e1e3a, #12122a);
  border: 2px solid rgba(255,215,0,0.3); border-radius: 20px;
  padding: 32px 24px; width: 90%; max-width: 340px;
  text-align: center; box-shadow: 0 12px 50px rgba(0,0,0,0.6);
}
.overlay-card h2 { color: #ffd700; font-size: 24px; margin-bottom: 8px; }
.overlay-card p { color: #bba14f; font-size: 13px; margin-bottom: 20px; }
.nick-input {
  width: 100%; padding: 14px 16px; border-radius: 12px;
  border: 2px solid rgba(255,215,0,0.3); background: rgba(255,255,255,0.05);
  color: #ffd700; font-size: 18px; font-weight: 600; text-align: center;
  outline: none; transition: border-color 0.2s;
  letter-spacing: 1px;
}
.nick-input:focus { border-color: #ffd700; }
.nick-input::placeholder { color: rgba(255,215,0,0.25); }
.start-btn {
  margin-top: 16px; width: 100%; padding: 14px; border-radius: 12px;
  border: none; background: linear-gradient(135deg, #ffd700, #b8860b);
  color: #1a1a2e; font-size: 17px; font-weight: 700; cursor: pointer;
  letter-spacing: 2px; transition: transform 0.15s;
}
.start-btn:active { transform: scale(0.95); }
.start-btn:disabled { opacity: 0.4; pointer-events: none; }

/* LEADERBOARD MODAL */
.modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  display: none; justify-content: center; align-items: center;
  z-index: 200; backdrop-filter: blur(4px);
}
.modal.show { display: flex; }
.modal-card {
  background: linear-gradient(145deg, #1e1e3a, #12122a);
  border: 2px solid rgba(255,215,0,0.3); border-radius: 20px;
  padding: 24px; width: 90%; max-width: 360px;
  box-shadow: 0 12px 50px rgba(0,0,0,0.6);
}
.modal-card h2 { color: #ffd700; text-align: center; font-size: 22px; margin-bottom: 16px; }
.lb-table { width: 100%; border-collapse: collapse; }
.lb-table th { color: #bba14f; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; padding: 8px 6px; border-bottom: 1px solid rgba(255,215,0,0.2); }
.lb-table td { color: #e0d0a0; font-size: 14px; padding: 10px 6px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
.lb-rank { font-weight: 700; color: #ffd700; }
.lb-name { text-align: left; font-weight: 600; }
.close-btn {
  display: block; margin: 16px auto 0; padding: 10px 32px;
  border-radius: 10px; border: 1px solid rgba(255,215,0,0.3);
  background: transparent; color: #ffd700; font-weight: 600;
  cursor: pointer; font-size: 14px;
}

.end-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display: none; justify-content: center; align-items: center;
  z-index: 150; backdrop-filter: blur(6px);
}
.end-overlay.show { display: flex; }
.end-card {
  background: linear-gradient(145deg, #1e1e3a, #12122a);
  border: 2px solid rgba(255,215,0,0.4); border-radius: 20px;
  padding: 28px 20px; width: 90%; max-width: 320px;
  text-align: center; box-shadow: 0 12px 50px rgba(255,215,0,0.15);
}
.end-card h2 { font-size: 28px; margin-bottom: 8px; }
.end-card .end-level { color: #ffd700; font-weight: 700; font-size: 20px; }
.end-card .end-time { color: #bba14f; font-size: 14px; margin-top: 4px; }
.end-btn {
  margin-top: 16px; width: 100%; padding: 14px;
  border-radius: 12px; border: none;
  background: linear-gradient(135deg, #ffd700, #b8860b);
  color: #1a1a2e; font-size: 17px; font-weight: 700; cursor: pointer;
}
</style>
</head>
<body>

<!-- Экран ввода ника -->
<div class="overlay" id="nickOverlay">
  <div class="overlay-card">
    <h2>💰 Мажор 2048</h2>
    <p>Введи ник, чтобы попасть<br>в таблицу лидеров</p>
    <input class="nick-input" id="nickInput" type="text" placeholder="Твой никнейм" maxlength="16" autocomplete="off">
    <button class="start-btn" id="startBtn" disabled>ИГРАТЬ</button>
  </div>
</div>

<!-- Модалка лидерборда -->
<div class="modal" id="leaderModal">
  <div class="modal-card">
    <h2>🏆 Топ-10 мажоров</h2>
    <table class="lb-table">
      <thead><tr><th>#</th><th>Ник</th><th>Уровень</th><th>Время</th></tr></thead>
      <tbody id="lbBody"></tbody>
    </table>
    <button class="close-btn" id="closeLeaderBtn">Закрыть</button>
  </div>
</div>

<!-- Экран конца игры -->
<div class="end-overlay" id="endOverlay">
  <div class="end-card">
    <div class="end-level" id="endLevel">Магнат</div>
    <h2 style="color:#ffd700;">Игра окончена!</h2>
    <div class="end-time" id="endTime">00:00</div>
    <button class="end-btn" id="restartBtn">ИГРАТЬ СНОВА</button>
  </div>
</div>

<div class="game-wrapper">
  <div class="header">
    <div class="title">💎 МАЖОР</div>
    <div class="score-box"><span class="score-label">БАЛАНС</span><span class="score-value" id="scoreVal">10₽</span></div>
    <div class="timer-box"><span class="timer-icon">⏱</span><span class="timer-value" id="timerVal">00:00</span></div>
  </div>
  <div class="controls">
    <button class="btn btn-outline" id="musicBtn">♪ Музыка</button>
    <button class="btn btn-outline" id="leaderBtn">🏆 ТОП</button>
    <button class="btn btn-gold" id="newGameBtn">Новая игра</button>
  </div>
  <div class="board-wrapper" id="boardWrapper"></div>
</div>

<script>
// ========== АУДИО ==========
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null, musicOn = false, musicTimer = null;
function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
function playBeep(freq = 440, dur = 0.1, type = 'triangle') {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}
function startMusic() {
  if (!audioCtx) initAudio();
  musicOn = true;
  const notes = [262, 294, 330, 349, 392, 349, 330, 294];
  let i = 0;
  const tick = () => { if (!musicOn) return; playBeep(notes[i % notes.length], 0.14, 'triangle'); i++; musicTimer = setTimeout(tick, 280); };
  tick();
}
function stopMusic() { musicOn = false; if (musicTimer) clearTimeout(musicTimer); }

// ========== GAME STATE ==========
const SIZE = 5;
let grid = [], score = 0, gameOver = false, playerNick = '';
let timerSec = 0, timerInterval = null;

// Банкноты РФ и премиум-активы
const LEVELS = [
  { val: 10,   label: '10₽',   emoji: '💵', color: '#4a6fa5', bg: 'rgba(74,111,165,0.35)' },
  { val: 50,   label: '50₽',   emoji: '💵', color: '#5d8aa8', bg: 'rgba(93,138,168,0.35)' },
  { val: 100,  label: '100₽',  emoji: '💶', color: '#8f9779', bg: 'rgba(143,151,121,0.35)' },
  { val: 500,  label: '500₽',  emoji: '💶', color: '#b8860b', bg: 'rgba(184,134,11,0.35)' },
  { val: 1000, label: '1000₽', emoji: '💷', color: '#20b2aa', bg: 'rgba(32,178,170,0.35)' },
  { val: 5000, label: '5K₽',   emoji: '💎', color: '#daa520', bg: 'rgba(218,165,32,0.40)' },
  { val: 10000,label: '10K₽',  emoji: '💎', color: '#ffd700', bg: 'rgba(255,215,0,0.40)' },
  { val: 25000,label: '🧳',    emoji: '🧳', color: '#c0c0c0', bg: 'rgba(192,192,192,0.40)' },
  { val: 50000,label: '🏎️',    emoji: '🏎️', color: '#ff4500', bg: 'rgba(255,69,0,0.40)' },
  { val: 100000,label:'🏦',    emoji: '🏦', color: '#4169e1', bg: 'rgba(65,105,225,0.40)' },
  { val: 250000,label:'👑',    emoji: '👑', color: '#ff1493', bg: 'rgba(255,20,147,0.45)' },
  { val: 500000,label:'💼',    emoji: '💼', color: '#8b0000', bg: 'rgba(139,0,0,0.45)' },
  { val: 1000000,label:'🏰',   emoji: '🏰', color: '#9400d3', bg: 'rgba(148,0,211,0.50)' },
  { val: 5000000,label:'🤴',   emoji: '🤴', color: '#ff8c00', bg: 'rgba(255,140,0,0.50)' },
  { val: 10000000,label:'👑МАГНАТ👑', emoji: '👑', color: '#ffd700', bg: 'rgba(255,215,0,0.55)', glow: true },
];

function getLevel(v) { return LEVELS.find(l => l.val === v) || LEVELS[0]; }
function maxTile() { let m = 0; for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (grid[r][c] > m) m = grid[r][c]; return m; }

function emptyCells() {
  const ec = [];
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (grid[r][c] === 0) ec.push({r,c});
  return ec;
}

function spawnTile() {
  const ec = emptyCells();
  if (ec.length === 0) return;
  const pos = ec[Math.floor(Math.random() * ec.length)];
  const maxV = maxTile();
  let val;
  if (maxV <= 50) val = Math.random() < 0.85 ? 10 : 50;
  else if (maxV <= 500) val = Math.random() < 0.15 ? 100 : (Math.random() < 0.7 ? 10 : 50);
  else if (maxV <= 5000) val = Math.random() < 0.1 ? 500 : (Math.random() < 0.5 ? 50 : (Math.random() < 0.8 ? 100 : 10));
  else if (maxV <= 100000) val = Math.random() < 0.08 ? 1000 : (Math.random() < 0.3 ? 500 : (Math.random() < 0.6 ? 100 : 50));
  else val = Math.random() < 0.05 ? 5000 : (Math.random() < 0.2 ? 1000 : (Math.random() < 0.5 ? 500 : 100));
  grid[pos.r][pos.c] = val;
  return pos;
}

function gameEndCheck() {
  if (emptyCells().length > 0) return false;
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (c < SIZE-1 && grid[r][c] === grid[r][c+1]) return false;
      if (r < SIZE-1 && grid[r][c] === grid[r+1][c]) return false;
    }
  }
  return true;
}

function getMergeFlags() { return Array.from({length: SIZE}, () => Array(SIZE).fill(false)); }
let mergeFlags = getMergeFlags();
let spawnedThisTurn = null;

function slideRow(row) {
  let arr = row.filter(v => v !== 0);
  let merged = Array(arr.length).fill(false);
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i+1] && !merged[i]) {
      arr[i] *= 2; arr[i+1] = 0; merged[i] = true;
      score += arr[i];
    }
  }
  arr = arr.filter(v => v !== 0);
  while (arr.length < SIZE) arr.push(0);
  return { result: arr, merged };
}

function getCol(c) { const col = []; for (let r = 0; r < SIZE; r++) col.push(grid[r][c]); return col; }
function setCol(c, arr) { for (let r = 0; r < SIZE; r++) grid[r][c] = arr[r]; }

function move(dir) {
  if (gameOver) return false;
  let moved = false;
  const oldGrid = grid.map(r => [...r]);
  mergeFlags = getMergeFlags();

  if (dir === 'left') {
    for (let r = 0; r < SIZE; r++) {
      const { result, merged } = slideRow(grid[r]);
      for (let c = 0; c < SIZE; c++) {
        if (merged[c]) mergeFlags[r][c] = true;
        if (grid[r][c] !== result[c]) moved = true;
        grid[r][c] = result[c];
      }
    }
  } else if (dir === 'right') {
    for (let r = 0; r < SIZE; r++) {
      let rev = [...grid[r]].reverse();
      const { result, merged: mRev } = slideRow(rev);
      let merged = Array(SIZE).fill(false);
      for (let i = 0; i < SIZE; i++) if (mRev[i]) merged[SIZE-1-i] = true;
      result.reverse();
      for (let c = 0; c < SIZE; c++) {
        if (merged[c]) mergeFlags[r][c] = true;
        if (grid[r][c] !== result[c]) moved = true;
        grid[r][c] = result[c];
      }
    }
  } else if (dir === 'up') {
    for (let c = 0; c < SIZE; c++) {
      let col = getCol(c);
      const { result, merged } = slideRow(col);
      for (let r = 0; r < SIZE; r++) {
        if (merged[r]) mergeFlags[r][c] = true;
        if (grid[r][c] !== result[r]) moved = true;
        grid[r][c] = result[r];
      }
    }
  } else if (dir === 'down') {
    for (let c = 0; c < SIZE; c++) {
      let col = getCol(c).reverse();
      const { result, merged: mRev } = slideRow(col);
      let merged = Array(SIZE).fill(false);
      for (let i = 0; i < SIZE; i++) if (mRev[i]) merged[SIZE-1-i] = true;
      result.reverse();
      for (let r = 0; r < SIZE; r++) {
        if (merged[r]) mergeFlags[r][c] = true;
        if (grid[r][c] !== result[r]) moved = true;
        grid[r][c] = result[r];
      }
    }
  }

  if (moved) {
    spawnedThisTurn = spawnTile();
    render();
    if (gameEndCheck()) endGame();
    return true;
  }
  return false;
}

// ========== RENDER ==========
const boardWrapper = document.getElementById('boardWrapper');
let tileEls = [];

function render(initial = false) {
  boardWrapper.querySelectorAll('.grid-cell,.tile').forEach(el => el.remove());
  const size = boardWrapper.clientWidth;
  const gap = Math.round(size * 0.025);
  const cellSize = Math.round((size - gap * (SIZE + 1)) / SIZE);

  // Grid bg
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.style.left = (gap + c * (cellSize + gap)) + 'px';
      cell.style.top = (gap + r * (cellSize + gap)) + 'px';
      cell.style.width = cellSize + 'px';
      cell.style.height = cellSize + 'px';
      boardWrapper.appendChild(cell);
    }
  }

  // Tiles
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (grid[r][c] === 0) continue;
      const lv = getLevel(grid[r][c]);
      const tile = document.createElement('div');
      tile.className = 'tile';
      const left = gap + c * (cellSize + gap);
      const top = gap + r * (cellSize + gap);
      tile.style.left = left + 'px';
      tile.style.top = top + 'px';
      tile.style.width = cellSize + 'px';
      tile.style.height = cellSize + 'px';
      tile.style.background = lv.bg;
      tile.style.color = lv.color;
      tile.style.border = lv.glow ? '2px solid rgba(255,215,0,0.6)' : '1px solid rgba(255,255,255,0.1)';
      if (lv.glow) tile.style.boxShadow = '0 0 18px rgba(255,215,0,0.4)';
      tile.style.fontSize = (cellSize * 0.28) + 'px';
      tile.textContent = lv.label;
      if (mergeFlags[r][c]) tile.classList.add('merge');
      if (!initial && spawnedThisTurn && spawnedThisTurn.r === r && spawnedThisTurn.c === c) tile.classList.add('pop');
      boardWrapper.appendChild(tile);
    }
  }

  document.getElementById('scoreVal').textContent = score.toLocaleString() + '₽';
}

function updateTimer() { document.getElementById('timerVal').textContent = formatTime(timerSec); }
function formatTime(s) { const m = Math.floor(s/60), sec = s%60; return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0'); }

// ========== LIFECYCLE ==========
function startGame() {
  grid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  score = 0; gameOver = false; timerSec = 0; mergeFlags = getMergeFlags();
  if (timerInterval) clearInterval(timerInterval);
  spawnTile(); spawnTile();
  render(true);
  updateTimer();
  document.getElementById('endOverlay').classList.remove('show');
  timerInterval = setInterval(() => { timerSec++; updateTimer(); }, 1000);
}

function endGame() {
  gameOver = true;
  if (timerInterval) clearInterval(timerInterval);
  saveToLeaderboard();
  document.getElementById('endLevel').textContent = getLevel(maxTile()).label;
  document.getElementById('endTime').textContent = formatTime(timerSec);
  document.getElementById('endOverlay').classList.add('show');
}

// ========== LEADERBOARD ==========
function loadLeaderboard() {
  try { return JSON.parse(localStorage.getItem('major2048_lb') || '[]'); }
  catch(e) { return []; }
}
function saveToLeaderboard() {
  if (!playerNick || playerNick.trim() === '') return;
  const lb = loadLeaderboard();
  lb.push({ nick: playerNick.trim(), level: maxTile(), time: timerSec, score, date: Date.now() });
  lb.sort((a,b) => b.level - a.level || a.time - b.time);
  const top = lb.slice(0, 10);
  localStorage.setItem('major2048_lb', JSON.stringify(top));
}
function showLeaderboard() {
  const lb = loadLeaderboard();
  const tbody = document.getElementById('lbBody');
  tbody.innerHTML = '';
  if (lb.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="color:#bba14f;padding:20px;">Пока никого нет. Стань первым!</td></tr>';
  } else {
    lb.forEach((e, i) => {
      tbody.innerHTML += `<tr>
        <td class="lb-rank">${i+1}</td>
        <td class="lb-name">${e.nick}</td>
        <td>${getLevel(e.level).label}</td>
        <td>${formatTime(e.time)}</td>
      </tr>`;
    });
  }
  document.getElementById('leaderModal').classList.add('show');
}

// ========== CONTROLS ==========
document.addEventListener('DOMContentLoaded', () => {
  const nickInput = document.getElementById('nickInput');
  const startBtn = document.getElementById('startBtn');

  nickInput.addEventListener('input', () => {
    startBtn.disabled = nickInput.value.trim().length < 2;
  });
  nickInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && nickInput.value.trim().length >= 2) {
      playerNick = nickInput.value.trim();
      document.getElementById('nickOverlay').style.display = 'none';
      initAudio();
      startGame();
    }
  });
  startBtn.addEventListener('click', () => {
    playerNick = nickInput.value.trim();
    document.getElementById('nickOverlay').style.display = 'none';
    initAudio();
    startGame();
  });

  document.getElementById('newGameBtn').addEventListener('click', () => {
    if (timerInterval) clearInterval(timerInterval);
    startGame();
  });
  document.getElementById('restartBtn').addEventListener('click', () => {
    startGame();
  });
  document.getElementById('leaderBtn').addEventListener('click', showLeaderboard);
  document.getElementById('closeLeaderBtn').addEventListener('click', () => {
    document.getElementById('leaderModal').classList.remove('show');
  });
  document.getElementById('leaderModal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('show');
  });
  document.getElementById('endOverlay').addEventListener('click', function(e) {
    if (e.target === this) { this.classList.remove('show'); startGame(); }
  });

  // Music
  const musicBtn = document.getElementById('musicBtn');
  musicBtn.addEventListener('click', () => {
    initAudio();
    if (musicOn) { stopMusic(); musicBtn.textContent = '♪ Музыка'; }
    else { startMusic(); musicBtn.textContent = '♪ Играет'; }
  });

  // Touch swipes
  let touchStart = null;
  boardWrapper.addEventListener('touchstart', (e) => {
    e.preventDefault();
    initAudio();
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, {passive: false});
  boardWrapper.addEventListener('touchend', (e) => {
    if (!touchStart || gameOver) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    const threshold = 30;
    if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) return;
    let dir;
    if (Math.abs(dx) > Math.abs(dy)) dir = dx > 0 ? 'right' : 'left';
    else dir = dy > 0 ? 'down' : 'up';
    if (move(dir)) playBeep(440 + score * 0.02, 0.06);
    touchStart = null;
  });

  // Keyboard
  window.addEventListener('keydown', (e) => {
    if (gameOver) return;
    const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down' };
    if (map[e.key]) { e.preventDefault(); initAudio(); if (move(map[e.key])) playBeep(440 + score * 0.02, 0.06); }
  });
});
</script>
</body>
</html>
