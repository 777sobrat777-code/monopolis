<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Мажор </title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #08081a;
  color: #e0c070;
  font-family: 'Georgia', serif;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; overflow-x: hidden;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
}
#game-container {
  max-width: 420px; width: 100%; padding: 10px;
}
.header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px; flex-wrap: wrap; gap: 6px;
}
.title {
  font-size: 1.5em; font-weight: bold;
  background: linear-gradient(180deg, #f0d060, #c09030);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.scores {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.score-box {
  background: #1a1a2e; border: 1px solid #c09030; border-radius: 6px;
  padding: 4px 10px; text-align: center; min-width: 60px;
}
.score-box .label { font-size: 0.65em; color: #a08050; text-transform: uppercase; }
.score-box .value { font-size: 1.1em; font-weight: bold; color: #f0d060; }
.controls {
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
  margin-bottom: 10px; justify-content: center;
}
.btn {
  background: linear-gradient(180deg, #2a2a3e, #1a1a2e);
  border: 1px solid #c09030; color: #e0c070; padding: 6px 12px;
  border-radius: 6px; cursor: pointer; font-family: 'Georgia', serif;
  font-size: 0.85em; transition: all 0.15s;
}
.btn:active { background: #3a3a4e; transform: scale(0.96); }
.btn.muted { opacity: 0.5; }
#board {
  position: relative; width: 100%; aspect-ratio: 1;
  background: #0d0d24; border-radius: 10px;
  border: 2px solid #c09030; overflow: hidden;
  box-shadow: 0 0 30px rgba(192,144,48,0.15);
}
#grid-layer {
  position: absolute; inset: 0; display: grid;
  grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(5, 1fr);
  gap: 6px; padding: 6px;
}
.grid-cell {
  background: #141428; border-radius: 6px;
  border: 1px solid rgba(192,144,48,0.15);
}
#tile-layer {
  position: absolute; inset: 0; pointer-events: none;
}
.tile {
  position: absolute; display: flex; align-items: center; justify-content: center;
  font-weight: bold; border-radius: 8px; transition: left 0.12s ease-out, top 0.12s ease-out;
  will-change: left, top, transform;
  text-shadow: 0 1px 0 rgba(0,0,0,0.5);
}
.tile.merged { animation: mergePop 0.2s ease-out; }
@keyframes mergePop {
  0% { transform: scale(1); } 40% { transform: scale(1.18); } 100% { transform: scale(1); }
}
.tile.spawned { animation: spawnPop 0.15s ease-out; }
@keyframes spawnPop {
  0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; }
}
#nickname-overlay {
  position: fixed; inset: 0; background: rgba(8,8,26,0.95);
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
#nickname-box {
  background: #1a1a2e; border: 2px solid #c09030; border-radius: 12px;
  padding: 24px; text-align: center; max-width: 320px; width: 90%;
}
#nickname-box h2 {
  color: #f0d060; margin-bottom: 12px; font-size: 1.3em;
}
#nickname-input {
  width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #c09030;
  background: #0d0d24; color: #f0d060; font-size: 1em; text-align: center;
  font-family: 'Georgia', serif; margin-bottom: 12px; outline: none;
}
#nickname-input:focus { border-color: #f0d060; }
#start-btn {
  background: linear-gradient(180deg, #c09030, #8a6020);
  border: none; color: #0a0a1a; padding: 10px 30px; border-radius: 6px;
  font-size: 1em; font-weight: bold; cursor: pointer; font-family: 'Georgia', serif;
  transition: all 0.15s; opacity: 0.5; pointer-events: none;
}
#start-btn.ready { opacity: 1; pointer-events: auto; }
#start-btn:active { transform: scale(0.95); }
#leaderboard-box {
  background: #1a1a2e; border: 2px solid #c09030; border-radius: 10px;
  padding: 12px; margin-top: 10px; max-height: 200px; overflow-y: auto;
  width: 100%;
}
#leaderboard-box h3 {
  color: #f0d060; text-align: center; font-size: 1em; margin-bottom: 6px;
}
.lb-entry {
  display: flex; justify-content: space-between; padding: 3px 8px;
  border-bottom: 1px solid rgba(192,144,48,0.1);
  font-size: 0.8em;
}
.lb-entry:last-child { border-bottom: none; }
.lb-entry.me { color: #f0d060; font-weight: bold; }
#timer {
  font-size: 0.9em; color: #a08050; text-align: center; margin-bottom: 6px;
  font-variant-numeric: tabular-nums;
}
</style>
</head>
<body>

<div id="nickname-overlay">
  <div id="nickname-box">
    <h2>Введи ник</h2>
    <input id="nickname-input" placeholder="Твой ник" maxlength="16" autocomplete="off">
    <br>
    <button id="start-btn" disabled>Играть</button>
  </div>
</div>

<div id="game-container">
  <div class="header">
    <div class="title">МАЖОР 2048</div>
    <div class="scores">
      <div class="score-box"><div class="label">Счёт</div><div class="value" id="score">0</div></div>
      <div class="score-box"><div class="label">Рекорд</div><div class="value" id="best">0</div></div>
      <div class="score-box"><div class="label">Макс</div><div class="value" id="max-nominal">10₽</div></div>
    </div>
  </div>
  <div class="controls">
    <button class="btn" id="btn-music">♪</button>
    <span id="timer">⏱ 00:00</span>
    <button class="btn" id="btn-reset">Новая игра</button>
  </div>
  <div id="board">
    <div id="grid-layer"></div>
    <div id="tile-layer"></div>
  </div>
  <div id="leaderboard-box">
    <h3>🏆 Лидерборд</h3>
    <div id="lb-list">Пока пусто</div>
  </div>
</div>

<script>
// ============ КОНСТАНТЫ ============
const SIZE = 5;
const NOMINALS = [
  {val:10,   label:'10₽',    bg:'#2a2a3e', color:'#c0c0c0', fontSize:'1em'},
  {val:50,   label:'50₽',    bg:'#2a352a', color:'#a0d0a0', fontSize:'1em'},
  {val:100,  label:'100₽',   bg:'#2a2a40', color:'#a0a0e0', fontSize:'1em'},
  {val:200,  label:'200₽',   bg:'#2a302a', color:'#80c080', fontSize:'1em'},
  {val:500,  label:'500₽',   bg:'#302a20', color:'#d0a040', fontSize:'0.95em'},
  {val:1000, label:'1 000₽', bg:'#352a1a', color:'#e0b050', fontSize:'0.85em'},
  {val:2000, label:'2 000₽', bg:'#3a2515', color:'#e08040', fontSize:'0.85em'},
  {val:5000, label:'5 000₽', bg:'#3a1a1a', color:'#e06060', fontSize:'0.8em'},
  {val:10000,label:'10K₽',   bg:'#2a1a30', color:'#c060c0', fontSize:'0.85em'},
  {val:20000,label:'20K₽',   bg:'#1a2a35', color:'#60a0c0', fontSize:'0.85em'},
  {val:50000,label:'50K₽',   bg:'#352020', color:'#ff9060', fontSize:'0.8em'},
  {val:100000,label:'100K₽', bg:'#332200', color:'#ffd700', fontSize:'0.75em'},
  {val:500000,label:'500K₽', bg:'#2a2000', color:'#ffcc00', fontSize:'0.75em'},
  {val:1000000,label:'1M₽',  bg:'#1a1a00', color:'#ffe000', fontSize:'0.7em'},
  {val:2000000,label:'МАГНАТ',bg:'#1a1000', color:'#ffaa00', fontSize:'0.7em'},
];
const nomMap = new Map(NOMINALS.map(n=>[n.val,n]));
const vals = NOMINALS.map(n=>n.val);

// ============ СОСТОЯНИЕ ============
let board = [];        // board[r][c] = val | 0
let score = 0;
let bestScore = 0;
let gameOver = false;
let maxNominal = 10;
let nickname = '';
let timerSec = 0;
let timerInterval = null;
let musicOn = true;
let audioCtx = null;
let lastNoteTime = 0;
let boardEl, tileLayerEl;

// ============ DOM ============
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const maxNomEl = document.getElementById('max-nominal');
const timerEl = document.getElementById('timer');
const lbList = document.getElementById('lb-list');
const btnMusic = document.getElementById('btn-music');
const btnReset = document.getElementById('btn-reset');
const nicknameOverlay = document.getElementById('nickname-overlay');
const nicknameInput = document.getElementById('nickname-input');
const startBtn = document.getElementById('start-btn');

// ============ СЕТКА ============
function buildGrid() {
  const grid = document.getElementById('grid-layer');
  grid.innerHTML = '';
  for(let i=0;i<SIZE*SIZE;i++){
    const cell = document.createElement('div');
    cell.className = 'grid-cell';
    grid.appendChild(cell);
  }
}
buildGrid();
boardEl = document.getElementById('board');
tileLayerEl = document.getElementById('tile-layer');

// ============ ВЫЧИСЛЕНИЕ ПОЗИЦИИ ПЛИТКИ ============
function tilePos(r,c) {
  const rect = boardEl.getBoundingClientRect();
  const w = rect.width / SIZE;
  const h = rect.height / SIZE;
  const pad = 6;
  const gap = 6;
  return {
    left: c * w + pad,
    top: r * h + pad,
    size: w - pad*2
  };
}

// ============ ОТРИСОВКА ============
function renderBoard() {
  tileLayerEl.innerHTML = '';
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(board[r][c]){
        const tile = document.createElement('div');
        tile.className = 'tile';
        const n = nomMap.get(board[r][c]);
        tile.textContent = n.label;
        tile.style.backgroundColor = n.bg;
        tile.style.color = n.color;
        tile.style.fontSize = n.fontSize;
        const pos = tilePos(r,c);
        tile.style.left = pos.left + 'px';
        tile.style.top = pos.top + 'px';
        tile.style.width = pos.size + 'px';
        tile.style.height = pos.size + 'px';
        // маркируем для поиска
        tile.dataset.r = r;
        tile.dataset.c = c;
        tile.dataset.val = board[r][c];
        tileLayerEl.appendChild(tile);
      }
    }
  }
}

// ============ ЗВУК ============
function ensureAudio() {
  if(!audioCtx){
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  }
}
function playNote(freq, dur=0.08) {
  if(!musicOn || !audioCtx) return;
  const now = audioCtx.currentTime;
  if(now - lastNoteTime < 0.02) return;
  lastNoteTime = now;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq, now);
  gain.gain.setValueAtTime(0.08, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now+dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now+dur);
}

// ============ ИГРОВАЯ ЛОГИКА ============
function getEmpty() {
  const list = [];
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(!board[r][c]) list.push([r,c]);
  return list;
}

function isFull() { return getEmpty().length===0; }

function spawnOne() {
  const empty = getEmpty();
  if(!empty.length) return;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  const curMax = maxNominal;
  let cand;
  // динамический спавн: чем выше макс, тем вероятнее более крупные
  if(curMax <= 50) cand = [10,10,10,10,10,10,10,50,50,100];
  else if(curMax <= 200) cand = [10,10,10,10,10,50,50,100,200];
  else if(curMax <= 1000) cand = [10,10,10,50,50,100,200,500];
  else cand = [10,10,50,50,100,200,500,1000];
  const val = cand[Math.floor(Math.random()*cand.length)];
  board[r][c] = val;
  // анимация спавна
  renderBoard();
  const tile = tileLayerEl.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
  if(tile) tile.classList.add('spawned');
  playNote(261.63 + Math.log2(val/10)*60, 0.12);
}

function moveTile(r1,c1,r2,c2) {
  if(board[r1][c1]===0) return 0;
  const v = board[r1][c1];
  board[r1][c1] = 0;
  board[r2][c2] = v;
  return 1;
}

function mergeTile(r1,c1,r2,c2) {
  if(board[r1][c1]===0 || board[r2][c2]===0) return 0;
  if(board[r1][c1]!==board[r2][c2]) return 0;
  const v = board[r1][c1];
  board[r1][c1] = 0;
  const idx = vals.indexOf(v);
  if(idx>=0 && idx < vals.length-1){
    board[r2][c2] = vals[idx+1];
  } else {
    board[r2][c2] = v*2;
  }
  const newVal = board[r2][c2];
  score += newVal;
  if(newVal > maxNominal) maxNominal = newVal;
  playNote(523.25 + Math.log2(newVal/10)*80, 0.18);
  return newVal;
}

function move(dir) {
  // dir: 'up','down','left','right'
  let moved = false;
  let mergedMask = Array.from({length:SIZE},()=>Array(SIZE).fill(false));
  
  function doLine(r,c,dr,dc) {
    // собираем значения строки
    let line = [];
    for(let i=0;i<SIZE;i++){
      const cr = r + dr*i;
      const cc = c + dc*i;
      if(board[cr][cc]!==0) line.push({val:board[cr][cc], fromR:cr, fromC:cc});
    }
    // мержим
    let merged = [];
    let i=0;
    while(i<line.length){
      if(i+1 < line.length && line[i].val===line[i+1].val){
        const idx = vals.indexOf(line[i].val);
        let newVal;
        if(idx>=0 && idx<vals.length-1) newVal = vals[idx+1];
        else newVal = line[i].val*2;
        merged.push({val:newVal, fromR:line[i+1].fromR, fromC:line[i+1].fromC, merged:true});
        score += newVal;
        if(newVal>maxNominal) maxNominal = newVal;
        playNote(523.25 + Math.log2(newVal/10)*80, 0.18);
        i+=2;
      } else {
        merged.push({val:line[i].val, fromR:line[i].fromR, fromC:line[i].fromC, merged:false});
        i++;
      }
    }
    // очищаем старые позиции
    for(let item of line){
      board[item.fromR][item.fromC] = 0;
    }
    // записываем новые
    for(let j=0;j<merged.length;j++){
      const cr = r + dr*j;
      const cc = c + dc*j;
      board[cr][cc] = merged[j].val;
      if(merged[j].merged) mergedMask[cr][cc] = true;
    }
    if(line.length>0) moved = true;
  }

  if(dir==='left'){
    for(let r=0;r<SIZE;r++) doLine(r,0,0,1);
  } else if(dir==='right'){
    for(let r=0;r<SIZE;r++) doLine(r,SIZE-1,0,-1);
  } else if(dir==='up'){
    for(let c=0;c<SIZE;c++) doLine(0,c,1,0);
  } else if(dir==='down'){
    for(let c=0;c<SIZE;c++) doLine(SIZE-1,c,-1,0);
  }

  if(!moved) return false;

  // рендер
  renderBoard();
  // анимация мержа
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      if(mergedMask[r][c]){
        const tile = tileLayerEl.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
        if(tile) tile.classList.add('merged');
      }
    }
  }

  // спавн новой
  spawnOne();

  // обновление UI
  updateUI();
  checkGameOver();
  saveState();
  return true;
}

function checkGameOver() {
  if(!isFull()) { gameOver=false; return; }
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE-1;c++){
      if(board[r][c]===board[r][c+1]) { gameOver=false; return; }
    }
  }
  for(let c=0;c<SIZE;c++){
    for(let r=0;r<SIZE-1;r++){
      if(board[r][c]===board[r+1][c]) { gameOver=false; return; }
    }
  }
  gameOver = true;
  stopTimer();
  saveRecord();
  renderLeaderboard();
}

function updateUI() {
  scoreEl.textContent = score;
  if(score > bestScore){
    bestScore = score;
    saveBest();
  }
  bestEl.textContent = bestScore;
  const nm = nomMap.get(maxNominal);
  maxNomEl.textContent = nm ? nm.label : maxNominal+'₽';
}

function resetGame() {
  board = Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  score = 0;
  gameOver = false;
  maxNominal = 10;
  timerSec = 0;
  timerEl.textContent = '⏱ 00:00';
  // стартовые две десятки
  const empty = getEmpty();
  const e1 = empty[Math.floor(Math.random()*empty.length)];
  board[e1[0]][e1[1]] = 10;
  const e2 = getEmpty();
  const e2pos = e2[Math.floor(Math.random()*e2.length)];
  board[e2pos[0]][e2pos[1]] = 10;
  renderBoard();
  updateUI();
  scoreEl.textContent = '0';
  bestEl.textContent = bestScore;
  maxNomEl.textContent = '10₽';
  startTimer();
  saveState();
  renderLeaderboard();
}

// ============ ТАЙМЕР ============
function startTimer() {
  stopTimer();
  timerInterval = setInterval(()=>{
    timerSec++;
    const m = Math.floor(timerSec/60);
    const s = timerSec%60;
    timerEl.textContent = '⏱ '+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  },1000);
}
function stopTimer() {
  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
}

// ============ ХРАНИЛИЩЕ ============
function saveBest() {
  try{ localStorage.setItem('major2048_best',bestScore); }catch(e){}
}
function loadBest() {
  try{ const v=localStorage.getItem('major2048_best'); if(v) bestScore=parseInt(v)||0; }catch(e){}
}
function saveState() {
  try{
    const data = {board,score,maxNominal,timerSec};
    localStorage.setItem('major2048_state',JSON.stringify(data));
  }catch(e){}
}
function loadState() {
  try{
    const raw = localStorage.getItem('major2048_state');
    if(raw){
      const data = JSON.parse(raw);
      board = data.board || [];
      score = data.score || 0;
      maxNominal = data.maxNominal || 10;
      timerSec = data.timerSec || 0;
      const m = Math.floor(timerSec/60);
      const s = timerSec%60;
      timerEl.textContent = '⏱ '+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
      renderBoard();
      updateUI();
      scoreEl.textContent = score;
      bestEl.textContent = bestScore;
      const nm = nomMap.get(maxNominal);
      maxNomEl.textContent = nm ? nm.label : maxNominal+'₽';
      return true;
    }
  }catch(e){}
  return false;
}
function saveRecord() {
  if(!nickname || score===0) return;
  try{
    const raw = localStorage.getItem('major2048_leaderboard');
    let lb = raw ? JSON.parse(raw) : [];
    lb.push({nick:nickname,score,timestamp:Date.now()});
    lb.sort((a,b)=>b.score-a.score);
    lb = lb.slice(0,10);
    localStorage.setItem('major2048_leaderboard',JSON.stringify(lb));
  }catch(e){}
}
function getLeaderboard() {
  try{
    const raw = localStorage.getItem('major2048_leaderboard');
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
function renderLeaderboard() {
  const lb = getLeaderboard();
  if(!lb.length){ lbList.innerHTML='Пока пусто'; return; }
  lbList.innerHTML = lb.map((e,i)=>`<div class="lb-entry${e.nick===nickname?' me':''}"><span>${i+1}. ${e.nick}</span><span>${e.score}₽</span></div>`).join('');
}

// ============ УПРАВЛЕНИЕ ============
function handleKey(e) {
  if(gameOver) return;
  ensureAudio();
  let dir;
  if(e.key==='ArrowLeft'||e.key==='a') dir='left';
  else if(e.key==='ArrowRight'||e.key==='d') dir='right';
  else if(e.key==='ArrowUp'||e.key==='w') dir='up';
  else if(e.key==='ArrowDown'||e.key==='s') dir='down';
  else return;
  e.preventDefault();
  move(dir);
}

let touchStartX=0, touchStartY=0;
function handleTouchStart(e) {
  if(gameOver) return;
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
}
function handleTouchEnd(e) {
  if(gameOver) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);
  const threshold = 25;
  if(Math.max(absDx,absDy) < threshold) return;
  let dir;
  if(absDx > absDy){
    dir = dx>0 ? 'right' : 'left';
  } else {
    dir = dy>0 ? 'down' : 'up';
  }
  e.preventDefault();
  ensureAudio();
  move(dir);
}

document.addEventListener('keydown', handleKey);
boardEl.addEventListener('touchstart', handleTouchStart, {passive:false});
boardEl.addEventListener('touchend', handleTouchEnd, {passive:false});
boardEl.addEventListener('touchmove',(e)=>e.preventDefault(),{passive:false});

// ============ КНОПКИ ============
btnMusic.addEventListener('click',(e)=>{
  e.preventDefault();
  ensureAudio();
  musicOn = !musicOn;
  btnMusic.classList.toggle('muted',!musicOn);
  if(musicOn) playNote(440,0.1);
});
btnReset.addEventListener('click',(e)=>{
  e.preventDefault();
  resetGame();
});

// ============ НИК ============
nicknameInput.addEventListener('input',()=>{
  const v = nicknameInput.value.trim();
  if(v.length>=2){
    startBtn.classList.add('ready');
    startBtn.disabled = false;
  } else {
    startBtn.classList.remove('ready');
    startBtn.disabled = true;
  }
});
startBtn.addEventListener('click',(e)=>{
  e.preventDefault();
  nickname = nicknameInput.value.trim();
  if(nickname.length<2) return;
  nicknameOverlay.style.display = 'none';
  ensureAudio();
  loadBest();
  if(!loadState()){
    resetGame();
  } else {
    startTimer();
  }
  renderLeaderboard();
  boardEl.focus();
});
nicknameInput.addEventListener('keydown',(e)=>{
  if(e.key==='Enter' && nicknameInput.value.trim().length>=2){
    startBtn.click();
  }
});

// ============ СТАРТ ============
nicknameInput.focus();
loadBest();
</script>
</body>
</html>
